// =============================================================================

// Full-stack version: React frontend + Node/Express/SQLite backend
// =============================================================================
const { useState, useEffect, useCallback, useMemo, useRef, useReducer } = React;

if (typeof Recharts === 'undefined') {
  document.getElementById('root').innerHTML =
    '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;color:#fc8181;background:#0f1117;flex-direction:column;gap:16px">' +

    '<div style="color:#a0aec0;font-size:13px">Check your internet connection and reload.</div></div>';
  throw new Error('Recharts not loaded');
}

const { ResponsiveContainer, AreaChart, Area, BarChart, Bar, PieChart, Pie, Cell,
        LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ReferenceLine } = Recharts;

// ─── Constants ───────────────────────────────────────────────────────────────
const MODEL      = 'claude-sonnet-4-6';
const PIE_COLORS = ['#3182ce','#68d391','#f6ad55','#fc8181','#b794f4','#4fd1c5','#f687b3','#a0aec0'];
const TABS       = ['Net Worth','Portfolio','Debt','Budget','Goals','Models','AI Agents'];

// ─── Utilities ───────────────────────────────────────────────────────────────
const sleep = ms => new Promise(r => setTimeout(r, ms));

const fmt = n => {
  if (n == null || isNaN(n)) return '—';
  const a = Math.abs(n), s = n < 0 ? '-' : '';
  if (a >= 1e9) return `${s}$${(a/1e9).toFixed(2)}B`;
  if (a >= 1e6) return `${s}$${(a/1e6).toFixed(2)}M`;
  if (a >= 1e3) return `${s}$${(a/1e3).toFixed(1)}K`;
  return `${s}$${a.toFixed(0)}`;
};
const fmtFull = n => n == null || isNaN(n) ? '—' :
  new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(n);
const fmtPct  = (n, showSign=true) => n == null || isNaN(n) ? '—' :
  `${showSign && n >= 0 ? '+' : ''}${n.toFixed(2)}%`;
const fmtDate = d => d ? new Date(d).toLocaleDateString('en-US',{month:'short',year:'numeric'}) : '—';
const monthsBetween = (a, b) => {
  const d1 = new Date(a), d2 = new Date(b);
  return Math.max(0, (d2.getFullYear()-d1.getFullYear())*12 + (d2.getMonth()-d1.getMonth()));
};

// ─── Parse helpers for AI synthesis output ───────────────────────────────────
function parseSynthesisGrades(text) {
  if (!text) return {};
  const CATEGORY_MAP = {
    portfolio:  ['portfolio','investment','allocation'],
    debt:       ['debt','liability','credit'],
    tax:        ['tax','efficiency'],
    retirement: ['retirement','retire','fire'],
    risk:       ['risk','drawdown','volatility'],
    macro:      ['macro','market','economic'],
  };
  const grades = {};
  const pat = /([A-Za-z][A-Za-z\s&\/]+):\s*([A-F][+-]?)\b/g;
  let m;
  while ((m = pat.exec(text)) !== null) {
    const label = m[1].toLowerCase().trim();
    for (const [cat, kws] of Object.entries(CATEGORY_MAP)) {
      if (!grades[cat] && kws.some(k => label.includes(k))) grades[cat] = m[2];
    }
  }
  return grades;
}
function gradeToScore(g) {
  const S = {'A+':98,'A':95,'A-':92,'B+':88,'B':82,'B-':78,'C+':73,'C':68,'C-':63,'D+':57,'D':50,'D-':43,'F':30};
  return S[g] ?? 65;
}
function overallScore(grades) {
  const vals = Object.values(grades).map(gradeToScore);
  return vals.length ? Math.round(vals.reduce((a,b)=>a+b)/vals.length) : null;
}
function parseSynthesisActions(text) {
  if (!text) return [];
  const items = text.match(/(?:^|\n)\s*(?:\*\*)?[1-3][\.\)]\s*(?:\*\*)?\s*(.+?)(?=\n\s*(?:\*\*)?[1-3][\.\)]|\n\n|$)/gs);
  if (items && items.length >= 2)
    return items.slice(0,3).map(m => m.replace(/^\s*(?:\*\*)?[1-3][\.\)]\s*(?:\*\*)?\s*/,'').replace(/\*\*/g,'').trim()).filter(Boolean);
  return [];
}

// ─── Backend API helpers ─────────────────────────────────────────────────────
// Simple fetch wrappers — all calls go to the same Express server that serves this page.

async function apiGet(path) {
  const r = await fetch(path);
  if (!r.ok) throw new Error(`GET ${path} → ${r.status}`);
  return r.json();
}
async function apiPost(path, body) {
  const r = await fetch(path, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
  if (!r.ok) { const e = await r.json().catch(()=>({error:r.statusText})); throw new Error(e.error||r.statusText); }
  return r.json();
}
async function apiPut(path, body) {
  const r = await fetch(path, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
  if (!r.ok) { const e = await r.json().catch(()=>({error:r.statusText})); throw new Error(e.error||r.statusText); }
  return r.json();
}
async function apiDelete(path) {
  const r = await fetch(path, { method:'DELETE' });
  if (!r.ok) throw new Error(`DELETE ${path} → ${r.status}`);
  return r.json();
}

/** Anthropic Claude API */
async function callAPI(messages, systemPrompt, apiKey, maxTokens=1400) {

    headers:{ 'Content-Type':'application/json', 'x-api-key':apiKey,

  if (!r.ok) { const t=await r.text(); throw new Error(`${r.status}: ${t}`); }

}

  if (d.error) throw new Error(d.error);

/** FRED via server proxy (avoids CORS block) */
async function fetchFRED(seriesId) {
  const d = await apiGet(`/api/proxy/fred?series_id=${encodeURIComponent(seriesId)}&limit=24&sort_order=desc`);
  if (!d.observations) throw new Error(`FRED error for ${seriesId}`);
  return d.observations.map(o=>({date:o.date,value:parseFloat(o.value)})).filter(o=>!isNaN(o.value));
}

async function fetchFinnhubNews(ticker) {
  const d = await apiGet(`/api/proxy/finnhub/news/${encodeURIComponent(ticker)}`);
  if (d.error) throw new Error(d.error);

// ─── Markdown renderer ────────────────────────────────────────────────────────
function RenderedText({ text }) {
  if (!text) return null;
  return (
    <div style={{lineHeight:1.75,fontSize:13,color:'#e2e8f0'}}>
      {text.split('\n').map((line,i) => {
        if (line.startsWith('## ')) return <h4 key={i} style={{color:'#63b3ed',fontWeight:600,margin:'10px 0 4px'}}>{line.slice(3)}</h4>;
        if (line.startsWith('# '))  return <h3 key={i} style={{color:'#e2e8f0',fontWeight:700,margin:'12px 0 6px'}}>{line.slice(2)}</h3>;
        if (line.startsWith('- ') || line.startsWith('* '))
          return <div key={i} style={{display:'flex',gap:8,margin:'2px 0'}}><span style={{color:'#63b3ed',flexShrink:0}}>•</span><span>{line.slice(2)}</span></div>;
        if (line.trim()==='') return <div key={i} style={{height:6}}/>;
        const parts = line.split(/\*\*(.*?)\*\*/);
        return <p key={i} style={{margin:'2px 0'}}>{parts.map((p,j) => j%2===1?<strong key={j}>{p}</strong>:p)}</p>;
      })}

}

// ─── Financial models ─────────────────────────────────────────────────────────

// milestones: [{ age, salaryChangePct }] — sorted ascending by age
// colaRate: annual savings contribution growth rate between milestones (e.g. 0.02 = contributions grow 2%/yr)
function runMonteCarlo({ currentAge, retirementAge, currentSavings, monthlyContribution,
                         milestones=[], cashflowBoosts=[], colaRate=0.02,
                         annualReturnMean=0.07, annualReturnStd=0.15, runs=1000 }) {
  const years = Math.max(1, retirementAge - currentAge);
  const sorted = [...milestones].sort((a, b) => a.age - b.age);

  // Precompute per-year contribution:
  //   base × COLA × career-milestone multipliers  (salary-linked, multiplicative)
  //   + cashflow boosts that unlock at each age    (debt payoff / goal funded, additive)
  const annualContribs = Array.from({ length: years }, (_, y) => {
    const age = currentAge + y;
    let mult = Math.pow(1 + colaRate, y);
    for (const m of sorted) {
      if (m.age <= age) mult *= (1 + m.salaryChangePct / 100);
    }
    const boost = cashflowBoosts.filter(b => b.age <= age).reduce((s, b) => s + b.amount, 0);
    return monthlyContribution * mult + boost; // monthly total
  });

  const results = new Array(runs);
  for (let r = 0; r < runs; r++) {
    let bal = currentSavings;
    for (let y = 0; y < years; y++) {
      const u1 = Math.random() || 1e-10, u2 = Math.random();
      const z = Math.sqrt(-2 * Math.log(u1)) * Math.cos(2 * Math.PI * u2);
      bal = bal * (1 + annualReturnMean + annualReturnStd * z) + annualContribs[y] * 12;
      if (bal < 0) bal = 0;
    }
    results[r] = bal;
  }
  results.sort((a, b) => a - b);
  const p = pct => results[Math.min(runs - 1, Math.floor(pct / 100 * runs))];

  // Deterministic median path for chart
  let bal = currentSavings;
  const chartData = Array.from({ length: years + 1 }, (_, y) => {
    if (y > 0) bal = bal * (1 + annualReturnMean) + annualContribs[y - 1] * 12;
    return { year: currentAge + y, median: Math.round(bal) };
  });

  return { p10: p(10), p25: p(25), p50: p(50), p75: p(75), p90: p(90), chartData, annualIncome4pct: p(50) * 0.04 };
}

// ─── Tax bracket lookup (2024 IRS rates) ─────────────────────────────────────
const TAX_BRACKETS = {
  single:             [[0,10],[11600,12],[47150,22],[100525,24],[191950,32],[243725,35],[609350,37]],
  married_jointly:    [[0,10],[23200,12],[94300,22],[201050,24],[383900,32],[487450,35],[731200,37]],
  married_separately: [[0,10],[11600,12],[47150,22],[100525,24],[191950,32],[243725,35],[365600,37]],
  head_of_household:  [[0,10],[16550,12],[63100,22],[100500,24],[191950,32],[243700,35],[609350,37]],
};

function calcMarginalRate(income, filingStatus) {
  const brackets = TAX_BRACKETS[filingStatus] || TAX_BRACKETS.single;
  let rate = 10;
  for (const [threshold, r] of brackets) {
    if ((income || 0) >= threshold) rate = r; else break;
  }
  return rate;
}

function reducer(state, action) {
  switch (action.type) {
    case 'HYDRATE': {
      const p = action.payload;
      const now = Date.now();
      const PRICES_TTL = 8 * 60 * 60 * 1000;  // 8 hours
      const NEWS_TTL   = 6 * 60 * 60 * 1000;  // 6 hours
      const MACRO_TTL  = 6 * 60 * 60 * 1000;  // 6 hours
      const isFresh = (fetchedAt, ttl) =>
        fetchedAt && (now - new Date(fetchedAt).getTime()) < ttl;
      const pricesFresh = isFresh(p.marketCache?.prices?.fetchedAt, PRICES_TTL);
      const newsFresh   = isFresh(p.marketCache?.news?.fetchedAt,   NEWS_TTL);
      const macroFresh  = isFresh(p.marketCache?.macro?.fetchedAt,  MACRO_TTL);
      const cachedPrices = pricesFresh ? (p.marketCache.prices.data || {}) : {};
      return { ...BLANK,
        profile:   { ...BLANK.profile, ...p.profile },
        assets:    p.assets    || [],
        liabilities: p.liabilities || [],
        cash:      p.cash      || [],
        goals:     p.goals     || [],
        apiKeys:   p.apiKeys   || BLANK.apiKeys,
        snapshots: p.snapshots || [],
        setupComplete: p.profile?.setupComplete || false,
        activeTab: 'Net Worth',
        livePrices:    cachedPrices,
        pricesFetching: false,
        pricesFetched: pricesFresh && Object.keys(cachedPrices).length > 0,
        news:          newsFresh  ? (p.marketCache.news.data  || {}) : {},
        macro:         macroFresh ? (p.marketCache.macro.data || {}) : {},
        newsFetchedAt: newsFresh  ? p.marketCache.news.fetchedAt   : null,
        macroFetchedAt:macroFresh ? p.marketCache.macro.fetchedAt  : null,
        agentResults: p.agentCache?.results || {},
        agentChat:    p.agentCache?.chat    || [],
        agentUpdatedAt: p.agentCache?.updatedAt || null,
      };
    }
    case 'SET_TAB':           return {...state, activeTab:action.tab};
    case 'SET_PRICES':        return {...state, livePrices:action.prices, pricesFetching:false, pricesFetched:true};
    case 'SET_NEWS':  return {...state, news:action.data, newsFetchedAt:action.fetchedAt};
    case 'SET_MACRO': return {...state, macro:action.data, macroFetchedAt:action.fetchedAt};
    case 'PRICES_FETCHING':   return {...state, pricesFetching:true};
    case 'SET_SETUP_COMPLETE':return {...state, setupComplete:true, profile:{...state.profile,...action.profile}};
    case 'ADD_ASSET':         return {...state, assets:[...state.assets, action.item]};
    case 'REMOVE_ASSET':      return {...state, assets:state.assets.filter(a=>a.id!==action.id)};
    case 'UPDATE_ASSET':      return {...state, assets:state.assets.map(a=>a.id===action.id?{...a,...action.data}:a)};
    // Lot actions — action.asset is the full updated asset (with lots) returned by the server
    case 'ADD_LOT':
    case 'REMOVE_LOT':
    case 'UPDATE_LOT':
      return {...state, assets:state.assets.map(a=>a.id===action.assetId ? {...a,...action.asset} : a)};
    case 'ADD_LIABILITY':     return {...state, liabilities:[...state.liabilities, action.item]};
    case 'REMOVE_LIABILITY':  return {...state, liabilities:state.liabilities.filter(l=>l.id!==action.id)};
    case 'UPDATE_LIABILITY':  return {...state, liabilities:state.liabilities.map(l=>l.id===action.id?{...l,...action.data}:l)};
    case 'ADD_CASH':          return {...state, cash:[...state.cash, action.item]};
    case 'REMOVE_CASH':       return {...state, cash:state.cash.filter(c=>c.id!==action.id)};
    case 'ADD_GOAL':          return {...state, goals:[...state.goals, action.item]};
    case 'REMOVE_GOAL':       return {...state, goals:state.goals.filter(g=>g.id!==action.id)};
    case 'UPDATE_GOAL':       return {...state, goals:state.goals.map(g=>g.id===action.id?{...g,...action.data}:g)};
    case 'SET_KEYS':          return {...state, apiKeys:{...state.apiKeys,...action.keys}};
    case 'SET_AGENT_RESULT':  return {...state, agentResults:{...state.agentResults,[action.id]:action.result}};
    case 'SET_AGENT_STATUS':  return {...state, agentStatus:{...state.agentStatus,[action.id]:action.status}};
    case 'CLEAR_AGENTS':      return {...state, agentResults:{}, agentStatus:{}};
    case 'SET_AGENT_CHAT':    return {...state, agentChat:action.chat};
    case 'SET_AGENT_UPDATED_AT': return {...state, agentUpdatedAt: action.updatedAt};
    default: return state;
  }
}

// LOGIN / REGISTER SCREEN
// =============================================================================
function LoginScreen({ onLogin }) {
  const [mode, setMode]     = useState('login'); // 'login' | 'register'
  const [username, setUser] = useState('');
  const [password, setPass] = useState('');
  const [error, setError]   = useState('');
  const [loading, setLoad]  = useState(false);

  const submit = async (e) => {
    e.preventDefault();
    if (!username.trim() || !password) return setError('Fill in all fields');
    setLoad(true); setError('');
    try {
      const data = await apiPost(`/api/auth/${mode}`, { username: username.trim(), password });
      onLogin(data.user);
    } catch (err) {
      setError(err.message);
    } finally { setLoad(false); }
  };

  return (
    <div className="auth-wrap">
      <div className="auth-box">
        <div className="auth-logo">💰 FinPal</div>
        <div className="auth-sub">
          Your personal financial advisor.<br />
          No bank sync. No data sold. Just analysis.
        </div>
        <div className="auth-tabs">
          <div className={`auth-tab ${mode==='login'?'active':''}`} onClick={()=>{setMode('login');setError('');}}>Log In</div>
          <div className={`auth-tab ${mode==='register'?'active':''}`} onClick={()=>{setMode('register');setError('');}}>Create Account</div>
        </div>
        {error && <div className="auth-error">{error}</div>}
        <form onSubmit={submit}>
          <div className="form-group">
            <label>Username</label>
            <input value={username} onChange={e=>setUser(e.target.value)} placeholder="your username" autoFocus autoComplete="username" />
          </div>
          <div className="form-group">
            <label>Password</label>
            <input type="password" value={password} onChange={e=>setPass(e.target.value)} placeholder="••••••••" autoComplete={mode==='login'?'current-password':'new-password'} />
          </div>
          <button type="submit" className="btn btn-primary w-full btn-lg" disabled={loading} style={{width:'100%'}}>
            {loading ? 'Please wait…' : mode==='login' ? 'Log In' : 'Create Account'}
          </button>
        </form>
        {mode==='register' && (
          <p style={{fontSize:11,color:'#4a5568',marginTop:12,lineHeight:1.6}}>
            Your data is stored locally on this server. API keys are saved per account and used server-side — never exposed to the browser.
          </p>
        )}
      </div>
    </div>
  );
}

function HealthScoreCard({ agentResults, agentStatus, agentUpdatedAt, onRunAgents }) {
  const synthesis = agentResults?.synthesis;
  const grades = React.useMemo(() => parseSynthesisGrades(synthesis), [synthesis]);
  const actions = React.useMemo(() => parseSynthesisActions(synthesis), [synthesis]);
  const score = React.useMemo(() => overallScore(grades), [grades]);
  const hasRun = !!synthesis;
  const isRunning = agentStatus?.synthesis === 'running';

  const scoreColor = !score ? '#718096' : score >= 80 ? '#68d391' : score >= 60 ? '#f6ad55' : '#fc8181';
  const GRADE_COLORS = { A:'#68d391', B:'#63b3ed', C:'#f6ad55', D:'#fc8181', F:'#fc8181' };
  const gradeColor = (g) => g ? (GRADE_COLORS[g[0]] || '#718096') : '#4a5568';

  const CATS = [
    {key:'portfolio',label:'Portfolio'},{key:'debt',label:'Debt'},{key:'tax',label:'Tax'},
    {key:'retirement',label:'Retirement'},{key:'risk',label:'Risk'},{key:'macro',label:'Macro'},
  ];

  const daysSince = agentUpdatedAt
    ? Math.floor((Date.now() - new Date(agentUpdatedAt).getTime()) / 86400000)
    : null;

  const scoreLabel = !score ? '—' : score >= 93 ? 'A' : score >= 85 ? 'B+' : score >= 80 ? 'B' : score >= 73 ? 'C+' : score >= 65 ? 'C' : score >= 55 ? 'D' : 'F';

  if (!hasRun && !isRunning) {
    return (
      <div className="card mb-6" style={{border:'1px solid #3182ce',background:'linear-gradient(135deg,#1a1f2e 60%,#1a2a3a)'}}>
        <div style={{display:'flex',alignItems:'center',gap:20,flexWrap:'wrap'}}>
          <div style={{fontSize:40}}>🎖️</div>
          <div style={{flex:1,minWidth:180}}>
            <div style={{fontWeight:700,fontSize:15,marginBottom:6}}>Get your Financial Health Score</div>
            <div style={{color:'#718096',fontSize:13,lineHeight:1.6}}>6 AI specialists analyze your portfolio, debt, taxes, and retirement — then give you A-F grades and 3 specific actions for this month.</div>
          </div>
          <button className="btn btn-primary" style={{padding:'10px 20px',fontSize:14,whiteSpace:'nowrap'}} onClick={onRunAgents}>Run Health Check →</button>
        </div>
      </div>
    );
  }

  if (isRunning) {
    return (
      <div className="card mb-6" style={{border:'1px solid #3182ce',textAlign:'center',padding:24}}>
        <div style={{color:'#63b3ed',fontSize:14}}>● Running financial health check…</div>
      </div>
    );
  }

  return (
    <div className="card mb-6" style={{border:'1px solid #2d3748'}}>
      <div style={{display:'flex',gap:20,alignItems:'center',flexWrap:'wrap',marginBottom:actions.length ? 16 : 0}}>
        <div style={{textAlign:'center',flexShrink:0}}>
          <div style={{width:84,height:84,border:`4px solid ${scoreColor}`,borderRadius:'50%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',margin:'0 auto 6px'}}>
            <div style={{fontSize:26,fontWeight:800,color:scoreColor,lineHeight:1}}>{score ?? '—'}</div>
            <div style={{fontSize:12,color:scoreColor,fontWeight:600}}>{scoreLabel}</div>
          </div>
          <div style={{fontSize:10,color:'#718096',textTransform:'uppercase',letterSpacing:'0.5px'}}>Health Score</div>
        </div>
        <div style={{flex:1,display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,minWidth:180}}>
          {CATS.map(({key,label}) => (
            <div key={key} style={{background:'#1a202c',borderRadius:6,padding:'8px 10px',border:'1px solid #2d3748'}}>
              <div style={{fontSize:10,color:'#718096',marginBottom:2}}>{label}</div>
              <div style={{fontSize:17,fontWeight:700,color:gradeColor(grades[key])}}>{grades[key] || '—'}</div>
            </div>
          ))}
        </div>
        <div style={{fontSize:11,color:'#4a5568',alignSelf:'flex-start',flexShrink:0,textAlign:'right'}}>
          {daysSince === 0 ? 'Updated today' : daysSince === 1 ? 'Updated yesterday' : daysSince !== null ? `Updated ${daysSince}d ago` : ''}
          <br/>
          <span style={{cursor:'pointer',color:'#63b3ed'}} onClick={onRunAgents}>Refresh →</span>
        </div>
      </div>
      {actions.length > 0 && (
        <div style={{borderTop:'1px solid #2d3748',paddingTop:14}}>
          <div style={{fontSize:11,color:'#718096',textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:10}}>Your Action Plan This Month</div>
          {actions.map((action, i) => (
            <div key={i} style={{display:'flex',alignItems:'flex-start',gap:10,marginBottom:8}}>
              <input type="checkbox" style={{accentColor:'#68d391',width:15,height:15,marginTop:2,flexShrink:0}} readOnly />
              <span style={{fontSize:13,color:'#e2e8f0',lineHeight:1.5}}>{action}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// NET WORTH TAB (uses real snapshot history)
// =============================================================================
function NetWorthTab({ state, dispatch }) {
  const { assets, liabilities, cash, livePrices, profile, snapshots, agentResults, agentStatus, agentUpdatedAt } = state;
  const [showAddCash, setShowAddCash] = useState(false);
  const [newCash, setNewCash] = useState({ name:'', amount:0, apy:0 });
  const [cashErr, setCashErr] = useState('');

  const assetValue = assets.reduce((s,a) => s + (livePrices[a.ticker]?.price || a.costBasis) * a.shares, 0);
  const cashValue  = cash.reduce((s,c) => s + c.amount, 0);
  const debtValue  = liabilities.reduce((s,l) => s + l.balance, 0);
  const netWorth   = assetValue + cashValue - debtValue;
  const sortedSnaps = [...(snapshots||[])].sort((a,b) =>
    (a.snapshot_month||a.snapshotMonth||'').localeCompare(b.snapshot_month||b.snapshotMonth||''));
  const prevSnap = sortedSnaps.length >= 2 ? sortedSnaps[sortedSnaps.length-2] : null;
  const nwDelta = prevSnap ? netWorth - (prevSnap.net_worth ?? prevSnap.netWorth ?? 0) : null;
  const nwDeltaPct = (nwDelta !== null && prevSnap) ? (nwDelta / Math.abs(prevSnap.net_worth ?? prevSnap.netWorth ?? 1) * 100) : null;
  const costBasisTotal = assets.reduce((s,a) => s + a.costBasis * a.shares, 0);
  const unrealizedGain = assetValue - costBasisTotal;

  const typeMap = {};
  assets.forEach(a => {
    const val = (livePrices[a.ticker]?.price || a.costBasis) * a.shares;
    typeMap[a.assetType] = (typeMap[a.assetType] || 0) + val;
  });
  if (cashValue > 0) typeMap['cash'] = cashValue;
  const pieData = Object.entries(typeMap).map(([name,value]) => ({
    name: name.charAt(0).toUpperCase()+name.slice(1), value: Math.round(value)
  }));

  const acctMap = {};
  assets.forEach(a => {
    const val = (livePrices[a.ticker]?.price || a.costBasis) * a.shares;
    acctMap[a.accountType] = (acctMap[a.accountType] || 0) + val;
  });
  const acctData = Object.entries(acctMap).map(([name,value]) => ({name, value: Math.round(value)}));

  const historyData = useMemo(() => {
    const pts = (snapshots||[]).map(s => ({
      month: s.snapshotMonth || s.snapshot_month || '',
      netWorth: s.netWorth ?? s.net_worth ?? 0,
    }));
    const nowMonth = new Date().toISOString().slice(0,7);
    if (!pts.length || pts[pts.length-1].month !== nowMonth)
      pts.push({ month: nowMonth, netWorth: Math.round(netWorth) });
    return pts;
  }, [snapshots, netWorth]);

  const projData = useMemo(() => {
    const ms = profile.annualIncome * 0.20 / 12;
    return Array.from({length:11},(_,i) => ({
      year: new Date().getFullYear()+i,
      projected: Math.round(netWorth + ms*12*i * Math.pow(1.07, i)),
    }));
  }, [netWorth, profile.annualIncome]);

  const addCash = async () => {
    if (!newCash.name.trim()) return setCashErr('Account name required');
    setCashErr('');
    try {
      const saved = await apiPost('/api/cash', {...newCash, amount:+newCash.amount, apy:+newCash.apy});
      dispatch({ type:'ADD_CASH', item:saved });
      setNewCash({ name:'', amount:0, apy:0 });
      setShowAddCash(false);
    } catch(e) { setCashErr(e.message); }
  };

  const removeCash = async (id) => {
    try { await apiDelete(`/api/cash/${id}`); dispatch({ type:'REMOVE_CASH', id }); } catch(e) {}
  };

  const statCard = (label, value, sub, color='#e2e8f0') => (
    <div className="card card-sm">
      <div className="card-title">{label}</div>
      <div className="card-value" style={{color}}>{value}</div>
      {sub && <div style={{fontSize:12,color:'#718096',marginTop:4}}>{sub}</div>}
    </div>
  );

  return (
    <div>
      <HealthScoreCard
        agentResults={agentResults}
        agentStatus={agentStatus}
        agentUpdatedAt={agentUpdatedAt}
        onRunAgents={() => dispatch({ type:'SET_TAB', tab:'AI Agents' })}
      />
      <div className="grid g4 gap-4 mb-6">
        {statCard('Net Worth', fmtFull(netWorth), (
          <span>
            {`${fmtFull(assetValue+cashValue)} assets — ${fmtFull(debtValue)} debt`}
            {nwDelta !== null ? (
              <span style={{display:'block',fontSize:11,color:nwDelta>=0?'#68d391':'#fc8181',marginTop:2}}>
                {nwDelta>=0?'▲':'▼'} {fmtFull(Math.abs(nwDelta))} ({Math.abs(nwDeltaPct).toFixed(1)}%) vs last month
              </span>
            ) : null}
          </span>
        ), netWorth>=0?'#68d391':'#fc8181')}
        {statCard('Investment Portfolio', fmtFull(assetValue), `Cost basis ${fmtFull(costBasisTotal)}`)}
        {statCard('Unrealized P&L', fmtFull(unrealizedGain), costBasisTotal>0?`${(unrealizedGain/costBasisTotal*100).toFixed(1)}% total return`:null, unrealizedGain>=0?'#68d391':'#fc8181')}
        {statCard('Cash & Savings', fmtFull(cashValue), cash.map(c=>c.name).join(', ')||'—')}
      </div>

      <div className="grid g2 gap-4 mb-6">
        <div className="card">
          <div className="section-title">Asset Allocation</div>
          {pieData.length > 0 ? (
            <ResponsiveContainer width="100%" height={220}>
              <PieChart>
                <Pie data={pieData} cx="50%" cy="50%" innerRadius={55} outerRadius={90} paddingAngle={3} dataKey="value">
                  {pieData.map((_,i) => <Cell key={i} fill={PIE_COLORS[i%PIE_COLORS.length]} />)}
                </Pie>
                <Tooltip formatter={v=>fmtFull(v)} contentStyle={{background:'#1a1f2e',border:'1px solid #2d3748',borderRadius:6,fontSize:12}} />
                <Legend iconSize={10} wrapperStyle={{fontSize:12}} />
              </PieChart>
            </ResponsiveContainer>
          ) : <div className="gray tc" style={{padding:'40px 0',fontSize:13}}>No assets added yet</div>}
        </div>
        <div className="card">
          <div className="section-title">By Account Type</div>
          {acctData.length > 0 ? (
            <ResponsiveContainer width="100%" height={220}>
              <BarChart data={acctData} layout="vertical" margin={{left:10,right:20}}>
                <XAxis type="number" tickFormatter={v=>fmt(v)} tick={{fill:'#718096',fontSize:11}} axisLine={false} tickLine={false} />
                <YAxis type="category" dataKey="name" tick={{fill:'#a0aec0',fontSize:12}} axisLine={false} tickLine={false} width={70} />
                <Tooltip formatter={v=>fmtFull(v)} contentStyle={{background:'#1a1f2e',border:'1px solid #2d3748',borderRadius:6,fontSize:12}} />
                <Bar dataKey="value" fill="#3182ce" radius={[0,4,4,0]} />
              </BarChart>
            </ResponsiveContainer>
          ) : <div className="gray tc" style={{padding:'40px 0',fontSize:13}}>No data</div>}
        </div>
      </div>

      {historyData.length > 1 && (
        <div className="card mb-6">
          <div className="section-title">Net Worth History <span style={{fontSize:12,fontWeight:400,color:'#718096'}}>(recorded monthly on login)</span></div>
          <ResponsiveContainer width="100%" height={200}>
            <AreaChart data={historyData} margin={{top:10,right:20,bottom:0,left:10}}>
              <defs>
                <linearGradient id="histGrad" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="5%" stopColor="#68d391" stopOpacity={0.3}/>
                  <stop offset="95%" stopColor="#68d391" stopOpacity={0}/>
                </linearGradient>
              </defs>
              <CartesianGrid strokeDasharray="3 3" stroke="#2d3748" />
              <XAxis dataKey="month" tick={{fill:'#718096',fontSize:11}} axisLine={false} tickLine={false} />

              <Tooltip formatter={v=>fmtFull(v)} contentStyle={{background:'#1a1f2e',border:'1px solid #2d3748',borderRadius:6,fontSize:12}} />

const CRYPTO_IDS = {
  BTC:'bitcoin', ETH:'ethereum', SOL:'solana', ADA:'cardano',
  AVAX:'avalanche-2', DOT:'polkadot', DOGE:'dogecoin', MATIC:'matic-network',

};

// Shared "Add Asset" panel used by PortfolioTab and SetupWizard
// Includes manual form + "Describe holdings" AI shortcut
function AddAssetPanel({ newAsset, setNewAsset, addAsset, addErr, apiKey, onParsed, compact }) {
  const [showDescribe, setShowDescribe] = useState(true);
  const [describeText, setDescribeText] = useState('');
  const [describeErr, setDescribeErr] = useState('');
  const [descParsing, setDescParsing] = useState(false);
  const [parsedItems, setParsedItems] = useState([]);

  const parseDescription = async () => {
    if (!apiKey) return setDescribeErr('Add your Anthropic API key in Settings to use this feature.');
    if (!describeText.trim()) return setDescribeErr('Enter a description first.');
    setDescribeErr(''); setDescParsing(true); setParsedItems([]);
    try {
      const sysPrompt = 'You are a financial data extractor. Return ONLY a valid JSON array with no explanation.';
      const prompt = `Extract investment holdings from this text into a JSON array. Each element must have: {ticker, name, shares, costBasis, accountType, assetType}. accountType must be one of: taxable, ira, 401k, roth. assetType must be one of: stock, etf, crypto, other. costBasis is the per-share/per-unit price paid (use 0 if unknown). Text:\n\n${describeText}`;
      const response = await callAPI([{role:'user',content:prompt}], sysPrompt, apiKey, 800);
      const json = response.match(/\[[\s\S]*\]/)?.[0];
      if (!json) throw new Error('No JSON found in response');
      const items = JSON.parse(json);
      setParsedItems(items);
    } catch(e) { setDescribeErr(`Parse error: ${e.message}`); }
    setDescParsing(false);
  };

  const applyParsed = (item) => {
    setNewAsset({ ticker: item.ticker||'', name: item.name||'', shares: item.shares||1,
                  costBasis: item.costBasis||0, accountType: item.accountType||'taxable',
                  assetType: item.assetType||'stock', purchaseDate: '' });
    setShowDescribe(false); setParsedItems([]); setDescribeText('');
    if (onParsed) onParsed([item]);
  };

  return (
    <div className="card mb-6">
      <div className="flex items-center justify-between mb-4">
        <div className="section-title" style={{margin:0}}>Add Asset</div>
        <button className="btn btn-secondary btn-sm" onClick={()=>{setShowDescribe(v=>!v);setDescribeErr('');setParsedItems([]);}}>
          {showDescribe ? 'Manual entry' : '✦ Describe holdings'}
        </button>
      </div>

      {showDescribe ? (
        <div>
          {!apiKey ? (
            <div style={{background:'#1a1f2e',border:'1px solid #3182ce',borderRadius:8,padding:'14px 16px',display:'flex',gap:12,alignItems:'center'}}>
              <div style={{fontSize:20}}>🔑</div>
              <div>
                <div style={{fontSize:13,fontWeight:600,marginBottom:4}}>Anthropic API key required</div>
                <div style={{fontSize:12,color:'#a0aec0',lineHeight:1.6}}>Add your key in <strong style={{color:'#63b3ed'}}>Settings</strong> to describe your holdings in plain English and have AI parse them automatically.</div>
              </div>
            </div>
          ) : (
            <div>
              <div className="form-group">
                <label>Describe your holdings in plain English</label>
                <textarea value={describeText} onChange={e=>setDescribeText(e.target.value)} rows={4}
                  placeholder={'e.g. "100 AAPL at $150 in taxable, 50 MSFT at $320 in my IRA, 2 BTC"'}
                  style={{width:'100%',background:'#0f1117',border:'1px solid #2d3748',color:'#e2e8f0',borderRadius:6,padding:8,fontSize:13,fontFamily:'inherit'}} />
              </div>
              {describeErr && <div style={{fontSize:12,color:'#fc8181',marginBottom:8}}>{describeErr}</div>}
              <button className="btn btn-primary" onClick={parseDescription} disabled={descParsing}>
                {descParsing ? 'Parsing…' : 'Parse with AI'}
              </button>
            </div>
          )}
          {parsedItems.length > 0 && (
            <div style={{marginTop:12}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
                <div style={{fontSize:12,color:'#a0aec0'}}>{parsedItems.length} holding{parsedItems.length>1?'s':''} found</div>
                <button className="btn btn-success btn-sm" onClick={()=>{ if(onParsed) onParsed(parsedItems); setParsedItems([]); setDescribeText(''); setShowDescribe(false); }}>
                  Add all {parsedItems.length > 1 ? `(${parsedItems.length})` : ''}
                </button>
              </div>
              {parsedItems.map((item, i) => (
                <div key={i} style={{display:'flex',gap:12,alignItems:'center',padding:'6px 10px',
                    border:'1px solid #2d3748',borderRadius:6,marginBottom:4,background:'#0f1117',
                    fontSize:12,color:'#e2e8f0'}}>
                  <span className="bold" style={{width:60}}>{item.ticker}</span>
                  <span className="gray">{item.shares} shares{item.costBasis ? ` @ $${item.costBasis}` : ''}</span>
                  <span className="badge b-blue">{item.accountType}</span>
                  <button className="btn btn-danger btn-sm" style={{marginLeft:'auto',padding:'2px 8px'}} onClick={()=>setParsedItems(arr=>arr.filter((_,j)=>j!==i))}>×</button>
                </div>
              ))}
            </div>
          )}
        </div>
      ) : (
        <div>
          <div className={compact ? 'grid g3 gap-4 mb-4' : 'grid g2 gap-4 mb-4'} style={{alignItems:'end'}}>
            <div className="form-group" style={{marginBottom:0}}><label>Ticker</label>
              <input value={newAsset.ticker} onChange={e=>setNewAsset(a=>({...a,ticker:e.target.value}))} placeholder="AAPL, BTC, VTI…" /></div>
            <div className="form-group" style={{marginBottom:0}}><label>Name (optional)</label>
              <input value={newAsset.name} onChange={e=>setNewAsset(a=>({...a,name:e.target.value}))} placeholder="Apple Inc." /></div>
            <div className="form-group" style={{marginBottom:0}}><label>Shares</label>
              <input type="number" min="0" step="any" value={newAsset.shares} onChange={e=>setNewAsset(a=>({...a,shares:e.target.value}))} /></div>
            <div className="form-group" style={{marginBottom:0}}><label>Cost Basis (per share)</label>
              <input type="number" min="0" step="any" value={newAsset.costBasis} onChange={e=>setNewAsset(a=>({...a,costBasis:e.target.value}))} /></div>
            <div className="form-group" style={{marginBottom:0}}><label>Purchase Date (optional)</label>
              <input type="date" value={newAsset.purchaseDate||''} onChange={e=>setNewAsset(a=>({...a,purchaseDate:e.target.value}))} /></div>
            <div className="form-group" style={{marginBottom:0}}><label>Account</label>
              <select value={newAsset.accountType} onChange={e=>setNewAsset(a=>({...a,accountType:e.target.value}))}>
                <option value="taxable">Taxable</option><option value="ira">IRA</option>
                <option value="401k">401(k)</option><option value="roth">Roth IRA</option></select></div>
            <div className="form-group" style={{marginBottom:0}}><label>Type</label>
              <select value={newAsset.assetType} onChange={e=>setNewAsset(a=>({...a,assetType:e.target.value}))}>
                <option value="stock">Stock</option><option value="etf">ETF</option>
                <option value="crypto">Crypto</option><option value="other">Other</option></select></div>
          </div>
          {addErr && <div style={{fontSize:12,color:'#fc8181',marginBottom:8}}>{addErr}</div>}
          <button className="btn btn-success" onClick={addAsset}>Add Asset</button>
        </div>
      )}
    </div>
  );
}

function PortfolioTab({ state, dispatch }) {
  const { assets, livePrices, pricesFetching, pricesFetched, apiKeys, news, macro, newsFetchedAt, macroFetchedAt } = state;
  const [fetchError, setFetchError] = useState('');
  const [editId, setEditId] = useState(null);
  const [mktLoading, setMktLoading] = useState({ news:false, macro:false });

  const FRED_SERIES = [
    { id:'FEDFUNDS', label:'Fed Funds Rate', unit:'%' },
    { id:'CPIAUCSL', label:'CPI (Inflation)', unit:' index' },
    { id:'UNRATE',   label:'Unemployment Rate', unit:'%' },
    { id:'DGS10',    label:'10-Year Treasury', unit:'%' },
  ];

  const fetchNewsData = useCallback(async () => {
    if (!apiKeys.finnhub) return;
    setMktLoading(l=>({...l,news:true}));
    const results = {}, errs = {};
    for (const a of assets.filter(a=>a.assetType!=='crypto'&&a.assetType!=='other').slice(0,8)) {
      try { results[a.ticker] = await fetchFinnhubNews(a.ticker); await sleep(300); }
      catch(e) { errs[a.ticker] = e.message; }
    }
    const now = new Date().toISOString();
    dispatch({ type:'SET_NEWS', data: results, fetchedAt: now });
    apiPost('/api/market-cache', { type: 'news', data: results }).catch(() => {});
    setMktLoading(l=>({...l,news:false}));
  }, [assets, apiKeys.finnhub, dispatch]);

  const fetchMacroData = useCallback(async () => {
    if (!apiKeys.fred) return;
    setMktLoading(l=>({...l,macro:true}));
    const results = {};
    for (const s of FRED_SERIES) {
      try {
        const data = await fetchFRED(s.id);
        results[s.id] = data.slice(0,12).reverse();
      } catch(e) {}
      await sleep(200);
    }
    const now = new Date().toISOString();
    dispatch({ type:'SET_MACRO', data: results, fetchedAt: now });
    apiPost('/api/market-cache', { type: 'macro', data: results }).catch(() => {});
    setMktLoading(l=>({...l,macro:false}));
  }, [apiKeys.fred, dispatch]);
  const [editData, setEditData] = useState({});
  const [showAdd, setShowAdd] = useState(false);
  const [newAsset, setNewAsset] = useState({ ticker:'', name:'', shares:1, costBasis:0, accountType:'taxable', assetType:'stock', purchaseDate:'' });
  const [addErr, setAddErr] = useState('');
  // Lot UI state
  const [expandedAsset, setExpandedAsset] = useState(null); // assetId
  const [showAddLot, setShowAddLot] = useState(null);       // assetId
  const [newLot, setNewLot] = useState({ shares:1, costBasis:0, purchaseDate:'' });
  const [lotErr, setLotErr] = useState('');

  const addLot = async (assetId) => {
    if (!newLot.shares || !newLot.costBasis) return setLotErr('Shares and cost basis required');
    setLotErr('');
    try {
      const { lot, asset } = await apiPost(`/api/assets/${assetId}/lots`, {
        shares: +newLot.shares, costBasis: +newLot.costBasis, purchaseDate: newLot.purchaseDate || null,
      });
      dispatch({ type:'ADD_LOT', assetId, lot, asset });
      setNewLot({ shares:1, costBasis:0, purchaseDate:'' });
      setShowAddLot(null);
    } catch(e) { setLotErr(e.message); }
  };

  const removeLot = async (assetId, lotId) => {
    try {
      const { asset } = await apiDelete(`/api/assets/${assetId}/lots/${lotId}`);
      dispatch({ type:'REMOVE_LOT', assetId, lotId, asset });
    } catch(e) { alert(e.message); }
  };

  const fetchPrices = useCallback(async () => {
    if (pricesFetching) return;
    dispatch({ type:'PRICES_FETCHING' });
    setFetchError('');
    const prices = {};
    const errors = [];
    for (const asset of assets) {
      try {
        if (asset.assetType === 'crypto') {
          const coinId = CRYPTO_IDS[asset.ticker.toUpperCase()] || asset.ticker.toLowerCase();
          prices[asset.ticker] = await fetchCryptoPrice(coinId);
        } else if (asset.assetType !== 'other' && apiKeys.finnhub) {
          // Server proxy handles rate limiting (13s between calls) and caching (15 min)
          prices[asset.ticker] = await fetchStockPrice(asset.ticker);
        }
      } catch(e) { errors.push(`${asset.ticker}: ${e.message}`); }
    }
    dispatch({ type:'SET_PRICES', prices });
    apiPost('/api/market-cache', { type: 'prices', data: prices }).catch(() => {});
    if (errors.length) setFetchError(errors.join(' | '));
  }, [assets, apiKeys, pricesFetching]);

  const enriched = useMemo(() => assets.map(a => {
    const lp = livePrices[a.ticker];
    const price = lp ? lp.price : a.costBasis;
    const value = price * a.shares;
    const costTotal = a.costBasis * a.shares;
    const gain = value - costTotal;
    const gainPct = costTotal > 0 ? (gain/costTotal*100) : 0;
    return { ...a, currentPrice:price, value, gain, gainPct, changePct:lp?.changePct||null };
  }), [assets, livePrices]);

  const totalValue = enriched.reduce((s,a) => s+a.value, 0);

  const topAsset = enriched && enriched.length ? enriched.reduce((a,b)=>(+(a.value||0))>(+(b.value||0))?a:b) : null;
  const topPct = topAsset && totalValue > 0 ? (+(topAsset.value||0)/totalValue*100) : 0;
  const isConcentrated = topPct > 25 || (topPct > 15 && (state.profile?.riskTolerance||state.profile?.risk_tolerance||3) <= 2);

  const typeGroups = useMemo(() => {
    const m = {};
    enriched.forEach(a => { m[a.assetType] = (m[a.assetType]||0) + a.value; });
    return Object.entries(m).map(([type,val]) => ({
      type, val, pct: totalValue>0 ? val/totalValue*100 : 0
    })).sort((a,b) => b.val-a.val);
  }, [enriched, totalValue]);

  const addAsset = async () => {
    if (!newAsset.ticker.trim()) return setAddErr('Ticker required');
    setAddErr('');
    try {
      const saved = await apiPost('/api/assets', {
        ...newAsset, ticker:newAsset.ticker.toUpperCase(),
        shares:+newAsset.shares, costBasis:+newAsset.costBasis,
        purchaseDate: newAsset.purchaseDate || null,
      });
      dispatch({ type:'ADD_ASSET', item:saved });
      setNewAsset({ ticker:'', name:'', shares:1, costBasis:0, accountType:'taxable', assetType:'stock', purchaseDate:'' });
      setShowAdd(false);
    } catch(e) { setAddErr(e.message); }
  };

  const startEdit = a => {
    const lp = livePrices[a.ticker];
    setEditId(a.id);
    setEditData({ shares:a.shares, costBasis:a.costBasis, accountType:a.accountType, assetType:a.assetType||'stock',
      manualPrice: lp ? lp.price : '' });
  };
  const saveEdit = async (id) => {
    try {
      const updated = await apiPut(`/api/assets/${id}`, {
        shares:+editData.shares, costBasis:+editData.costBasis, accountType:editData.accountType, assetType:editData.assetType,
      });
      dispatch({ type:'UPDATE_ASSET', id, data:updated });
      // Persist manual price into livePrices so value/gain calculations use it
      if (editData.manualPrice !== '' && +editData.manualPrice > 0) {
        const ticker = updated.ticker || updated.Ticker;
        dispatch({ type:'SET_PRICES', prices: { ...livePrices, [ticker]: { price: +editData.manualPrice, changePct: null } } });
      }
    } catch(e) {}
    setEditId(null);
  };
  const removeAsset = async (id) => {
    try { await apiDelete(`/api/assets/${id}`); dispatch({ type:'REMOVE_ASSET', id }); } catch(e) {}
  };

  return (
    <div>
      <div className="flex items-center justify-between mb-6">
        <div>
          <div style={{fontSize:12,color:'#718096'}}>Total Portfolio Value</div>
          <div style={{fontSize:26,fontWeight:700}}>{fmtFull(totalValue)}</div>
        </div>
        <div className="flex gap-2 items-center">
          {pricesFetching && <span className="spinner" />}
          {fetchError && <span style={{fontSize:11,color:'#fc8181',maxWidth:280}}>{fetchError}</span>}
          {!apiKeys.finnhub && <span style={{fontSize:11,color:'#718096'}}>Add Finnhub key in Settings for live prices</span>}
          <button className="btn btn-secondary" onClick={fetchPrices} disabled={pricesFetching||assets.length===0}>
            {pricesFetching?'Fetching…':pricesFetched?'↻ Refresh':'Fetch Live Prices'}
          </button>
          <button className="btn btn-primary" onClick={()=>setShowAdd(v=>!v)}>
            {showAdd?'Cancel':'+ Add Asset'}
          </button>
        </div>
      </div>

      {showAdd && (
        <AddAssetPanel
          newAsset={newAsset} setNewAsset={setNewAsset}
          addAsset={addAsset} addErr={addErr}
          apiKey={apiKeys.anthropic}
          onParsed={async items => {
            for (const item of items) {
              try {
                const saved = await apiPost('/api/assets', {
                  ...item, ticker: item.ticker.toUpperCase(),
                  shares: +item.shares, costBasis: +item.costBasis,
                  purchaseDate: item.purchaseDate || null,
                });
                dispatch({ type:'ADD_ASSET', item:saved });
              } catch(e) { setAddErr(e.message); break; }
            }
            setShowAdd(false);
          }}
        />
      )}

      {topAsset && totalValue > 0 && (
        <div className="card mb-4" style={{background:isConcentrated?'#1a100f':'#0f1a0f',border:`1px solid ${isConcentrated?'#744210':'#276749'}`}}>
          <div style={{fontSize:13,color:'#e2e8f0',lineHeight:1.6}}>
            <span style={{fontWeight:600,color:'#63b3ed'}}>{topAsset.ticker}</span> is your largest position at <strong>{topPct.toFixed(1)}%</strong>.{' '}
            {isConcentrated
              ? <span style={{color:'#f6ad55'}}>This concentration may increase portfolio risk — consider diversifying.</span>
              : <span style={{color:'#68d391'}}>This is within a healthy range.</span>}
          </div>
        </div>
      )}

      <div className="card mb-6" style={{padding:0,overflow:'hidden'}}>
        <table>
          <thead><tr>
            <th>Ticker</th><th>Name</th><th>Shares</th><th>Price</th>
            <th>Value</th><th>Cost Basis</th><th>Gain/Loss</th><th>Day %</th><th>Account</th><th>Type</th><th>Weight</th><th></th>
          </tr></thead>
          <tbody>
            {enriched.length === 0 && (
              <tr><td colSpan="12" className="tc gray" style={{padding:24}}>No assets — click "+ Add Asset" above</td></tr>
            )}
            {enriched.map(a => (
              editId === a.id ? (
                <tr key={a.id} style={{background:'#1e2536'}}>
                  <td className="bold">{a.ticker}</td>
                  <td colSpan="2">
                    <div style={{fontSize:10,color:'#718096',marginBottom:2}}>Shares</div>

                        {showAddLot === a.id ? (

                              <input type="number" step="any" value={newLot.costBasis} onChange={e=>setNewLot(l=>({...l,costBasis:e.target.value}))} style={{width:90}} />
                            </div>
                            {lotErr && <span style={{fontSize:11,color:'#fc8181'}}>{lotErr}</span>}
                            <button className="btn btn-success btn-sm" onClick={()=>addLot(a.id)}>Save Lot</button>

            {!apiKeys.fred && <span style={{fontSize:11,color:'#718096'}}>Add FRED API key for live macro data</span>}
            <button className="btn btn-secondary btn-sm" onClick={fetchMacroData} disabled={mktLoading.macro||!apiKeys.fred}>

        <div className="grid g2 gap-4">
          {FRED_SERIES.map(s => {
            const obs = macro[s.id];

            {!apiKeys.finnhub && <span style={{fontSize:11,color:'#718096'}}>Add Finnhub API key for news</span>}

function DebtTab({ state, dispatch }) {
  const { liabilities } = state;
  const [extra, setExtra] = useState(0);
  const [showAdd, setShowAdd] = useState(false);
  const [newLiab, setNewLiab] = useState({ name:'', type:'mortgage', balance:0, apr:5, minPayment:0 });
  const [addErr, setAddErr] = useState('');

  const totalDebt    = liabilities.reduce((s,l) => s+l.balance, 0);
  const totalMinPay  = liabilities.reduce((s,l) => s+l.minPayment, 0);
  const weightedAPR  = totalDebt > 0 ? liabilities.reduce((s,l) => s+l.apr*l.balance, 0)/totalDebt : 0;

  const avalanche = useMemo(() => {
    if (!liabilities.length) return {months:0,totalInterest:0};
    let rem = liabilities.map(d=>({...d,bal:d.balance}));
    let month=0, totalInterest=0;
    while (rem.some(d=>d.bal>0.01) && month<600) {
      month++;
      let budget = liabilities.reduce((s,d)=>s+d.minPayment,0) + extra;
      rem = [...rem].sort((a,b)=>b.apr-a.apr);
      for (const d of rem) {
        if (d.bal<=0) continue;
        const int = d.bal*(d.apr/100/12);
        totalInterest+=int; d.bal+=int;
        const pay=Math.min(d.bal,budget); d.bal-=pay; budget-=pay;
        if (budget<=0.01) break;
      }
    }
    return {months:month, totalInterest:Math.round(totalInterest)};
  }, [liabilities, extra]);

  const avalancheWith200 = React.useMemo(() => {
    if (!liabilities.length) return null;
    let debts = liabilities.map(d=>({bal:+(d.balance||0),apr:+(d.apr||0)/100/12,min:+(d.minPayment||d.min_payment||0)}))
      .sort((a,b)=>b.apr-a.apr);
    const totalMin = debts.reduce((s,d)=>s+d.min,0);
    let months=0;
    const payment = totalMin + 200;
    while(debts.some(d=>d.bal>0.01) && months<600){
      months++;
      let extra=200;
      debts=debts.map(d=>{
        if(d.bal<=0)return d;
        d.bal+=d.bal*d.apr;
        const pay=Math.min(d.bal,d.min);
        d.bal-=pay;
        return d;
      });
      for(let i=0;i<debts.length;i++){
        if(debts[i].bal>0){
          const pay=Math.min(debts[i].bal,extra);
          debts[i].bal-=pay;
          extra-=pay;
          if(extra<=0)break;
        }
      }
    }
    return months<600?months:null;
  }, [liabilities]);

  const snowball = useMemo(() => {
    if (!liabilities.length) return {months:0,totalInterest:0};
    let rem = liabilities.map(d=>({...d,bal:d.balance}));
    let month=0, totalInterest=0;
    while (rem.some(d=>d.bal>0.01) && month<600) {
      month++;
      let budget = liabilities.reduce((s,d)=>s+d.minPayment,0) + extra;
      rem = [...rem].sort((a,b)=>a.bal-b.bal);
      for (const d of rem) {
        if (d.bal<=0) continue;
        const int = d.bal*(d.apr/100/12);
        totalInterest+=int; d.bal+=int;
        const pay=Math.min(d.bal,budget); d.bal-=pay; budget-=pay;
        if (budget<=0.01) break;
      }
    }
    return {months:month, totalInterest:Math.round(totalInterest)};
  }, [liabilities, extra]);

  const typeColors = { mortgage:'#3182ce', credit_card:'#fc8181', student:'#68d391', auto:'#f6ad55', other:'#b794f4' };

  const addLiability = async () => {
    if (!newLiab.name.trim()) return setAddErr('Name required');
    setAddErr('');
    try {
      const saved = await apiPost('/api/liabilities', {
        ...newLiab, balance:+newLiab.balance, apr:+newLiab.apr, minPayment:+newLiab.minPayment,
      });
      dispatch({ type:'ADD_LIABILITY', item:saved });
      setNewLiab({ name:'', type:'mortgage', balance:0, apr:5, minPayment:0 });
      setShowAdd(false);
    } catch(e) { setAddErr(e.message); }
  };

  const removeLiability = async (id) => {
    try { await apiDelete(`/api/liabilities/${id}`); dispatch({ type:'REMOVE_LIABILITY', id }); } catch(e) {}
  };

  return (
    <div>
      {liabilities.length > 0 && avalanche && avalanche.months < 600 && (
        <div className="card mb-6" style={{background:'#0f1a0f',border:'1px solid #276749'}}>
          <div style={{fontSize:12,color:'#68d391',fontWeight:600,marginBottom:6}}>Debt Payoff Outlook</div>
          <div style={{fontSize:13,color:'#e2e8f0',lineHeight:1.7}}>
            At minimum payments, you'll be debt-free in <strong>{avalanche.months} months</strong>.{' '}
            {avalancheWith200 && avalancheWith200 < avalanche.months && (
              <>Paying <span style={{color:'#68d391',fontWeight:600}}>$200/mo extra</span> cuts that to <strong>{avalancheWith200} months</strong> — saving {avalanche.months - avalancheWith200} months.</>
            )}
          </div>
        </div>
      )}
      <div className="grid g3 gap-4 mb-6">
        <div className="card card-sm"><div className="card-title">Total Debt</div><div className="card-value red">{fmtFull(totalDebt)}</div></div>
        <div className="card card-sm">
          <div className="card-title">Weighted APR</div>
          <div className="card-value">{weightedAPR.toFixed(2)}%</div>
          <div style={{fontSize:12,color:'#718096'}}>Min payment {fmtFull(totalMinPay)}/mo</div>
        </div>
        <div className="card card-sm">
          <div className="card-title">Interest Saved (Avalanche)</div>
          <div className="card-value green">{fmtFull(snowball.totalInterest-avalanche.totalInterest)}</div>
          <div style={{fontSize:12,color:'#718096'}}>vs Snowball method</div>
        </div>
      </div>

      <div className="card mb-6" style={{padding:0,overflow:'hidden'}}>
        <div style={{padding:'14px 16px'}} className="flex items-center justify-between">
          <span className="section-title" style={{marginBottom:0}}>Your Debts</span>
          <button className="btn btn-primary btn-sm" onClick={()=>setShowAdd(v=>!v)}>
            {showAdd?'Cancel':'+ Add Debt'}
          </button>
        </div>
        {showAdd && (
          <div style={{padding:'0 16px 16px'}}>
            <div className="grid g2 gap-4 mb-4" style={{alignItems:'end'}}>
              <div className="form-group" style={{marginBottom:0}}><label>Name</label>
                <input value={newLiab.name} onChange={e=>setNewLiab(l=>({...l,name:e.target.value}))} placeholder="Chase Mortgage" /></div>
              <div className="form-group" style={{marginBottom:0}}><label>Type</label>
                <select value={newLiab.type} onChange={e=>setNewLiab(l=>({...l,type:e.target.value}))}>
                  <option value="mortgage">Mortgage</option><option value="auto">Auto</option>
                  <option value="student">Student Loan</option><option value="credit_card">Credit Card</option>
                  <option value="other">Other</option></select></div>
              <div className="form-group" style={{marginBottom:0}}><label>Balance ($)</label>
                <input type="number" min="0" value={newLiab.balance} onChange={e=>setNewLiab(l=>({...l,balance:e.target.value}))} /></div>
              <div className="form-group" style={{marginBottom:0}}><label>APR (%)</label>
                <input type="number" min="0" step="0.1" value={newLiab.apr} onChange={e=>setNewLiab(l=>({...l,apr:e.target.value}))} /></div>
              <div className="form-group" style={{marginBottom:0}}><label>Min Payment ($)</label>
                <input type="number" min="0" value={newLiab.minPayment} onChange={e=>setNewLiab(l=>({...l,minPayment:e.target.value}))} /></div>
            </div>
            {addErr && <div style={{fontSize:12,color:'#fc8181',marginBottom:8}}>{addErr}</div>}
            <button className="btn btn-success btn-sm" onClick={addLiability}>Add Debt</button>
          </div>
        )}
        <table>
          <thead><tr><th>Name</th><th>Type</th><th>Balance</th><th>APR</th><th>Min Payment</th><th>Payoff*</th><th></th></tr></thead>
          <tbody>
            {liabilities.length===0 && (
              <tr><td colSpan="7" className="tc gray" style={{padding:20}}>No debts added</td></tr>
            )}
            {liabilities.map(l => {
              const moEst = l.balance>0&&l.minPayment>0
                ? Math.ceil(-Math.log(1-(l.apr/100/12)*l.balance/l.minPayment)/Math.log(1+l.apr/100/12))
                : null;
              return (
                <tr key={l.id}>
                  <td className="bold">{l.name}</td>
                  <td><span className="badge" style={{background:'#1e2536',color:typeColors[l.type]||'#a0aec0'}}>{l.type.replace('_',' ')}</span></td>
                  <td className="bold red">{fmtFull(l.balance)}</td>
                  <td className={l.apr>10?'red':l.apr>5?'yellow':'green'}>{l.apr}%</td>
                  <td>{fmtFull(l.minPayment)}/mo</td>
                  <td className="gray">{moEst&&moEst>0&&isFinite(moEst)?`${moEst} mo`:'—'}</td>
                  <td><button className="btn btn-danger btn-sm" onClick={()=>removeLiability(l.id)}>×</button></td>
                </tr>
              );
            })}
          </tbody>
        </table>
        <div style={{padding:'8px 16px',fontSize:11,color:'#4a5568'}}>*At minimum payment only</div>
      </div>

      {liabilities.length > 0 && (
        <div className="card">
          <div className="section-title">Payoff Strategy Comparison</div>
          <div className="flex items-center gap-4 mb-4">
            <label style={{fontSize:13,color:'#a0aec0',whiteSpace:'nowrap'}}>Extra monthly payment: </label>
            <input type="number" min="0" value={extra} onChange={e=>setExtra(+e.target.value)} style={{width:120}} placeholder="$0" />
          </div>
          <div className="grid g2 gap-4 mb-4">
            <div style={{background:'#0f1117',padding:16,borderRadius:8,border:'1px solid #2d3748'}}>
              <div style={{fontSize:12,color:'#718096',marginBottom:4}}>Avalanche (Pay Highest APR First)</div>
              <div style={{fontSize:20,fontWeight:700,color:'#68d391'}}>{avalanche.months} months</div>
              <div style={{fontSize:13,color:'#a0aec0'}}>{fmtFull(avalanche.totalInterest)} total interest</div>
            </div>
            <div style={{background:'#0f1117',padding:16,borderRadius:8,border:'1px solid #2d3748'}}>
              <div style={{fontSize:12,color:'#718096',marginBottom:4}}>Snowball (Pay Smallest Balance First)</div>
              <div style={{fontSize:20,fontWeight:700,color:'#f6ad55'}}>{snowball.months} months</div>
              <div style={{fontSize:13,color:'#a0aec0'}}>{fmtFull(snowball.totalInterest)} total interest</div>
            </div>
          </div>
          <ResponsiveContainer width="100%" height={160}>
            <BarChart data={[
              {name:'Avalanche (Optimal)',months:avalanche.months,interest:avalanche.totalInterest},
              {name:'Snowball (Motivating)',months:snowball.months,interest:snowball.totalInterest},
            ]} layout="vertical" margin={{left:10,right:40}}>
              <XAxis type="number" tickFormatter={v=>fmt(v)} tick={{fill:'#718096',fontSize:11}} axisLine={false} tickLine={false} />
              <YAxis type="category" dataKey="name" tick={{fill:'#a0aec0',fontSize:11}} axisLine={false} tickLine={false} width={160} />

              <Bar dataKey="interest" name="interest" fill="#fc8181" radius={[0,4,4,0]} />

        </div>

    </div>
  );
}

// =============================================================================
// BUDGET TAB
// =============================================================================
function BudgetTab({ state }) {
  const { profile, liabilities } = state;
  const annualIncome = +(profile.annualIncome || profile.annual_income || 0);
  const grossMonthly = Math.round(annualIncome / 12);

  const estimateTax = (annual) => {
    if (!annual) return 0;
    const brackets = [[11600,0.10],[35550,0.12],[53375,0.22],[91425,0.24],[51775,0.32],[365625,0.35],[1e9,0.37]];
    let tax = 0, rem = annual;
    for (const [size, rate] of brackets) {
      const t = Math.min(rem, size); tax += t * rate; rem -= t;
      if (rem <= 0) break;
    }
    return Math.round(tax);
  };

  // Load persisted budget from localStorage
  const initBudget = () => {
    try { return JSON.parse(localStorage.getItem('finpal_budget') || '{}'); } catch { return {}; }
  };
  const saved = React.useMemo(initBudget, []);

  const [housing,   setHousing]   = useState(saved.housing   ?? Math.round(grossMonthly * 0.30));
  const [transport, setTransport] = useState(saved.transport  ?? Math.round(grossMonthly * 0.10));
  const [food,      setFood]      = useState(saved.food       ?? Math.round(grossMonthly * 0.12));
  const [other,     setOther]     = useState(saved.other      ?? Math.round(grossMonthly * 0.08));
  const [goalSavings, setGoalSavings] = useState(saved.goalSavings ?? Math.round(grossMonthly * 0.05));
  const [taxOverride, setTaxOverride] = useState(saved.taxOverride ?? null); // null = auto

  // Persist on change
  useEffect(() => {
    localStorage.setItem('finpal_budget', JSON.stringify({ housing, transport, food, other, goalSavings, taxOverride }));
  }, [housing, transport, food, other, goalSavings, taxOverride]);

  const autoTax    = estimateTax(annualIncome);
  const monthlyTax = Math.round((taxOverride !== null ? taxOverride : autoTax) / 12);
  const takeHome   = grossMonthly - monthlyTax;
  const totalExp   = housing + transport + food + other;
  const afterExp   = takeHome - totalExp;
  const debtMin    = Math.round(liabilities.reduce((s,l) => s + (+(l.minPayment||0)), 0));
  const afterDebt  = afterExp - debtMin;
  const investable = afterDebt - goalSavings;

  // Stacked bar segments (% of gross)
  const pct = v => grossMonthly > 0 ? Math.max(0, Math.min(100, v / grossMonthly * 100)) : 0;
  const segments = [
    { label:'Taxes',      value:monthlyTax,  color:'#fc8181' },
    { label:'Housing',    value:housing,     color:'#f6ad55' },
    { label:'Transport',  value:transport,   color:'#ecc94b' },
    { label:'Food',       value:food,        color:'#f6ad55', opacity:0.7 },
    { label:'Other',      value:other,       color:'#a0aec0' },
    { label:'Debt',       value:debtMin,     color:'#fc8181', opacity:0.7 },
    { label:'Goals',      value:goalSavings, color:'#b794f4' },
    { label:'Investable', value:Math.max(0,investable), color:'#68d391' },
  ];

  const row = (label, amount, sublabel, color='#e2e8f0', prefix='-') => (
    <div style={{display:'flex',alignItems:'baseline',justifyContent:'space-between',padding:'10px 0',borderBottom:'1px solid #1a1f2e'}}>
      <div>
        <span style={{fontSize:14,color:'#a0aec0'}}>{prefix} {label}</span>
        {sublabel && <span style={{fontSize:11,color:'#4a5568',marginLeft:8}}>{sublabel}</span>}
      </div>
      <span style={{fontSize:15,fontWeight:600,color}}>{prefix==='-'?'−':''}{fmtFull(Math.abs(amount))}</span>
    </div>
  );

  const totalRow = (label, amount) => (
    <div style={{display:'flex',alignItems:'baseline',justifyContent:'space-between',padding:'12px 0',borderBottom:'2px solid #2d3748'}}>
      <span style={{fontSize:14,fontWeight:700,color:'#e2e8f0'}}>{label}</span>
      <span style={{fontSize:18,fontWeight:700,color:amount>=0?'#68d391':'#fc8181'}}>{fmtFull(amount)}</span>
    </div>
  );

  const editRow = (label, value, setter, sublabel) => (
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid #1a1f2e'}}>
      <div>
        <span style={{fontSize:14,color:'#a0aec0'}}>− {label}</span>
        {sublabel && <span style={{fontSize:11,color:'#4a5568',marginLeft:8}}>{sublabel}</span>}
      </div>
      <div style={{display:'flex',alignItems:'center',gap:6}}>
        <span style={{fontSize:13,color:'#718096'}}>$</span>
        <input type="number" min="0" value={value}
          onChange={e=>setter(Math.max(0,+e.target.value))}
          style={{width:100,textAlign:'right',fontSize:14,fontWeight:600}} />
        <span style={{fontSize:13,color:'#718096'}}>/mo</span>
      </div>
    </div>
  );

  return (
    <div>
      {/* ── Stacked composition bar ── */}
      <div className="card mb-6">
        <div className="section-title" style={{marginBottom:12}}>Where your money goes</div>
        <div style={{display:'flex',height:28,borderRadius:6,overflow:'hidden',marginBottom:10}}>
          {segments.map((s,i) => (
            <div key={i} style={{width:`${pct(s.value)}%`,background:s.color,opacity:s.opacity||1,transition:'width 0.3s'}} title={`${s.label}: ${fmtFull(s.value)}`} />
          ))}
        </div>
        <div style={{display:'flex',flexWrap:'wrap',gap:'6px 16px'}}>
          {segments.map((s,i) => (
            <div key={i} style={{display:'flex',alignItems:'center',gap:5,fontSize:11}}>
              <div style={{width:10,height:10,borderRadius:2,background:s.color,opacity:s.opacity||1,flexShrink:0}} />
              <span style={{color:'#718096'}}>{s.label}</span>
              <span style={{color:'#a0aec0',fontWeight:600}}>{pct(s.value).toFixed(0)}%</span>
            </div>
          ))}
        </div>
      </div>

      <div className="grid g2 gap-6">
        {/* ── Left: cascade ── */}
        <div className="card">
          <div style={{padding:'10px 0',borderBottom:'2px solid #2d3748',display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:4}}>
            <span style={{fontSize:14,fontWeight:700,color:'#e2e8f0'}}>Gross monthly income</span>
            <span style={{fontSize:20,fontWeight:700,color:'#63b3ed'}}>{fmtFull(grossMonthly)}</span>
          </div>

          {/* Tax */}
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid #1a1f2e'}}>
            <div>
              <span style={{fontSize:14,color:'#a0aec0'}}>− Est. taxes</span>
              <span style={{fontSize:11,color:'#4a5568',marginLeft:8}}>
                {taxOverride !== null
                  ? <button style={{fontSize:10,color:'#63b3ed',background:'none',border:'none',cursor:'pointer',padding:0}} onClick={()=>setTaxOverride(null)}>reset to auto</button>
                  : `~${annualIncome>0?(autoTax/annualIncome*100).toFixed(0):0}% effective`}
              </span>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:6}}>
              <span style={{fontSize:13,color:'#718096'}}>$</span>
              <input type="number" min="0" value={taxOverride !== null ? Math.round(taxOverride/12) : monthlyTax}
                onChange={e=>setTaxOverride(Math.max(0,+e.target.value)*12)}
                style={{width:100,textAlign:'right',fontSize:14,fontWeight:600}} />
              <span style={{fontSize:13,color:'#718096'}}>/mo</span>
            </div>
          </div>

          {totalRow('Take-home', takeHome)}

          {editRow('Housing', housing, setHousing, 'rent, mortgage, utilities')}
          {editRow('Transport', transport, setTransport, 'car, fuel, transit')}
          {editRow('Food & dining', food, setFood, 'groceries, restaurants')}
          {editRow('Everything else', other, setOther, 'subscriptions, personal, misc')}

          {totalRow('After expenses', afterExp)}

          {row('Debt minimums', debtMin, 'auto from Debt tab', '#fc8181')}

          {totalRow('After debt', afterDebt)}

          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid #1a1f2e'}}>
            <div>
              <span style={{fontSize:14,color:'#a0aec0'}}>− Goal savings</span>
              <span style={{fontSize:11,color:'#4a5568',marginLeft:8}}>feeds Goals tab</span>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:6}}>
              <span style={{fontSize:13,color:'#718096'}}>$</span>
              <input type="number" min="0" value={goalSavings}
                onChange={e=>setGoalSavings(Math.max(0,+e.target.value))}
                style={{width:100,textAlign:'right',fontSize:14,fontWeight:600}} />
              <span style={{fontSize:13,color:'#718096'}}>/mo</span>
            </div>
          </div>

          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'16px 0 4px'}}>
            <span style={{fontSize:15,fontWeight:700}}>Available to invest</span>
            <span style={{fontSize:26,fontWeight:800,color:investable>=0?'#68d391':'#fc8181'}}>{fmtFull(investable)}<span style={{fontSize:14,fontWeight:400,color:'#718096'}}>/mo</span></span>
          </div>
          {investable < 0 && (
            <div style={{fontSize:12,color:'#fc8181',marginTop:4}}>
              You're {fmtFull(Math.abs(investable))}/mo over budget — reduce expenses or debt to free up cash.
            </div>
          )}
          {investable > 0 && (
            <div style={{fontSize:12,color:'#68d391',marginTop:4}}>
              Invest this consistently and it compounds to{' '}
              <strong style={{color:'#68d391'}}>{fmtFull(Math.round(investable*12*((Math.pow(1.07,10)-1)/0.07)))}</strong> in 10 years at 7%.
            </div>
          )}
        </div>

        {/* ── Right: summary cards ── */}
        <div>
          <div className="card mb-4">
            <div className="section-title" style={{marginBottom:12}}>Monthly snapshot</div>
            {[
              ['Gross income',      grossMonthly, '#63b3ed'],
              ['Taxes',            -monthlyTax,   '#fc8181'],
              ['Take-home',         takeHome,      '#e2e8f0'],
              ['Total expenses',   -totalExp,      '#f6ad55'],
              ['Debt payments',    -debtMin,       '#fc8181'],

              <div key={label} style={{display:'flex',justifyContent:'space-between',fontSize:13,padding:'6px 0',borderBottom:'1px solid #1a1f2e'}}>

          </div>

          <div className="card mb-4">
            <div className="section-title" style={{marginBottom:12}}>Expense ratios</div>
            {[
              ['Housing',     housing],
              ['Transport',   transport],
              ['Food',        food],
              ['Other',       other],
              ['Debt',        debtMin],
              ['Goals',       goalSavings],
            ].map(([label, val]) => (
              <div key={label} style={{marginBottom:8}}>

                </div>

          <div className="card" style={{background:'#0f1a0f',border:'1px solid #276749'}}>

              ));
            })()}
          </div>
        </div>
      </div>
    </div>
  );

// =============================================================================
// GOALS TAB
// =============================================================================
function GoalsTab({ state, dispatch }) {
  const { goals, cash, assets, livePrices, profile } = state;
  const today = new Date();

  // Monthly savings budget — read from Budget tab (goalSavings field in localStorage)
  const monthlyBudget = useMemo(() => {
    try {
      const b = JSON.parse(localStorage.getItem('finpal_budget') || '{}');
      if (b.goalSavings != null) return +b.goalSavings;
    } catch {}
    return Math.round((+(profile.annualIncome||profile.annual_income||0)) * 0.20 / 12) || 1000;
  }, [profile.annualIncome, profile.annual_income]);

  const [showAdd, setShowAdd] = useState(false);
  const [newGoal, setNewGoal] = useState({ name:'', targetAmount:0, targetDate:'', currentSaved:0, priority:'medium' });
  const [addErr, setAddErr] = useState('');
  const [editId, setEditId] = useState(null);
  const [editData, setEditData] = useState({});

  // Liquid context
  const totalCash = cash.reduce((s,c) => s + c.amount, 0);
  const totalPortfolio = assets.reduce((s,a) => s + (livePrices[a.ticker]?.price||a.costBasis)*a.shares, 0);

  const PRI_WEIGHT = { high:3, medium:2, low:1 };

  // Enrich goals with computed fields, sorted by urgency
  const enriched = useMemo(() => {
    return goals.map(g => {
      const targetDate = g.targetDate || g.target_date || '';
      const targetAmt  = +(g.targetAmount ?? g.target_amount ?? 0);
      const saved      = +(g.currentSaved ?? g.current_saved ?? 0);
      const remaining  = Math.max(0, targetAmt - saved);
      const pct        = targetAmt > 0 ? Math.min(100, saved / targetAmt * 100) : 0;
      const months     = monthsBetween(today, targetDate);
      const monthlyNeeded = months > 0 ? remaining / months : (remaining > 0 ? Infinity : 0);
      const pw         = PRI_WEIGHT[g.priority] || 2;
      // Urgency: high priority, near deadline, low completion = high urgency
      const urgency    = months > 0 ? (pw * (1 - pct/100 + 0.1) * 100) / months : pw * 20;
      return { ...g, targetDate, targetAmt, saved, remaining, pct, months, monthlyNeeded, urgency };
    }).sort((a, b) => b.urgency - a.urgency);
  }, [goals, today]);

  // Allocate monthly budget across goals by urgency weight
  const allocations = useMemo(() => {
    const totalNeeded = enriched.reduce((s,g) => s + (isFinite(g.monthlyNeeded) ? g.monthlyNeeded : 0), 0);
    if (totalNeeded <= 0) return {};
    const allocs = {};
    if (totalNeeded <= monthlyBudget) {
      enriched.forEach(g => { allocs[g.id] = isFinite(g.monthlyNeeded) ? g.monthlyNeeded : 0; });
    } else {
      const totalUrgency = enriched.reduce((s,g) => s + g.urgency, 0);
      enriched.forEach(g => {
        const raw = totalUrgency > 0 ? (g.urgency / totalUrgency) * monthlyBudget : 0;
        allocs[g.id] = Math.min(raw, isFinite(g.monthlyNeeded) ? g.monthlyNeeded : raw);
      });
    }
    return allocs;
  }, [enriched, monthlyBudget]);

  const totalNeeded   = enriched.reduce((s,g) => s + (isFinite(g.monthlyNeeded) ? g.monthlyNeeded : 0), 0);
  const totalAllocated = Object.values(allocations).reduce((s,v) => s+v, 0);
  const surplus       = monthlyBudget - totalAllocated;
  const onTrackCount  = enriched.filter(g => {
    const alloc = allocations[g.id] || 0;
    return g.remaining <= 0 || (isFinite(g.monthlyNeeded) && alloc >= g.monthlyNeeded * 0.95);
  }).length;

  // Projected months to complete goal at its allocated amount
  const projMonths = (g) => {
    const alloc = allocations[g.id] || 0;
    if (g.remaining <= 0) return 0;
    if (alloc <= 0) return Infinity;
    return Math.ceil(g.remaining / alloc);
  };

  const addGoal = async () => {
    if (!newGoal.name.trim() || !newGoal.targetDate) return setAddErr('Name and target date required');
    setAddErr('');
    try {
      const saved = await apiPost('/api/goals', {
        ...newGoal, targetAmount:+newGoal.targetAmount, currentSaved:+newGoal.currentSaved,
      });
      dispatch({ type:'ADD_GOAL', item:saved });
      setNewGoal({ name:'', targetAmount:0, targetDate:'', currentSaved:0, priority:'medium' });
      setShowAdd(false);
    } catch(e) { setAddErr(e.message); }
  };

  const removeGoal = async (id) => {
    try { await apiDelete(`/api/goals/${id}`); dispatch({ type:'REMOVE_GOAL', id }); } catch(e) {}
  };

  const startEdit = (g) => {
    setEditId(g.id);
    setEditData({ name:g.name, targetAmount:g.targetAmt, targetDate:g.targetDate, currentSaved:g.saved, priority:g.priority });
  };

  const saveEdit = async () => {
    try {
      const updated = await apiPut(`/api/goals/${editId}`, {
        name: editData.name, targetAmount:+editData.targetAmount,
        targetDate: editData.targetDate, currentSaved:+editData.currentSaved,
        priority: editData.priority,
      });
      dispatch({ type:'UPDATE_GOAL', id:editId, data:updated });
    } catch(e) {}
    setEditId(null);
  };

  return (
    <div>
      {/* ── Budget & summary bar ── */}
      <div className="card mb-6">
        <div className="flex items-center justify-between mb-4">
          <div>
            <div className="section-title" style={{marginBottom:2}}>Monthly Goal Savings</div>
            <div style={{fontSize:12,color:'#718096'}}>Set in the Budget tab — "Goal savings" line</div>
          </div>
          <div className="flex gap-2 items-center">
            <span style={{fontSize:22,fontWeight:700,color:'#68d391'}}>{fmtFull(monthlyBudget)}<span style={{fontSize:13,fontWeight:400,color:'#718096'}}>/mo</span></span>
            <button className="btn btn-secondary btn-sm" style={{fontSize:11}}
              onClick={()=>window.dispatchEvent(new CustomEvent('finpal-nav',{detail:'Budget'}))}>
              Edit in Budget →
            </button>
          </div>
        </div>

        {enriched.length > 0 && (
          <>
            <div style={{display:'flex',gap:8,marginBottom:10,flexWrap:'wrap'}}>
              <div className="card card-sm" style={{flex:1,minWidth:120,padding:'10px 14px'}}>
                <div className="card-title">Goals on track</div>
                <div className="card-value" style={{color: onTrackCount===enriched.length?'#68d391':'#f6ad55'}}>
                  {onTrackCount} / {enriched.length}
                </div>
              </div>
              <div className="card card-sm" style={{flex:1,minWidth:120,padding:'10px 14px'}}>
                <div className="card-title">Total needed/mo</div>
                <div className="card-value" style={{color:'#e2e8f0'}}>{isFinite(totalNeeded)?fmtFull(totalNeeded):'—'}</div>
              </div>
              <div className="card card-sm" style={{flex:1,minWidth:120,padding:'10px 14px'}}>
                <div className="card-title">{surplus >= 0 ? 'Surplus/mo' : 'Shortfall/mo'}</div>
                <div className="card-value" style={{color:surplus>=0?'#68d391':'#fc8181'}}>{fmtFull(Math.abs(surplus))}</div>
              </div>
              <div className="card card-sm" style={{flex:1,minWidth:120,padding:'10px 14px'}}>
                <div className="card-title">Liquid savings</div>
                <div className="card-value" style={{color:'#63b3ed'}}>{fmtFull(totalCash)}</div>
              </div>
            </div>

            {/* Budget allocation bar */}
            <div style={{marginBottom:4,fontSize:11,color:'#718096'}}>Budget allocation</div>
            <div className="progress-track" style={{height:10,marginBottom:4}}>
              <div className="progress-fill" style={{
                width:`${Math.min(100,(totalAllocated/monthlyBudget)*100)}%`,
                background: totalAllocated > monthlyBudget ? '#fc8181' : '#68d391',
              }} />
            </div>
            <div style={{fontSize:11,color:'#718096'}}>{fmtFull(totalAllocated)} allocated of {fmtFull(monthlyBudget)} budget</div>
          </>
        )}
      </div>

      {/* ── Header + add button ── */}
      <div className="flex items-center justify-between mb-4">
        <div className="section-title" style={{marginBottom:0}}>Goals</div>
        <button className="btn btn-primary btn-sm" onClick={()=>setShowAdd(v=>!v)}>
          {showAdd?'Cancel':'+ Add Goal'}
        </button>
      </div>

      {/* ── Add form ── */}
      {showAdd && (
        <div className="card mb-6">
          <div className="grid g2 gap-4 mb-4" style={{alignItems:'end'}}>
            <div className="form-group" style={{marginBottom:0}}><label>Goal Name</label>
              <input value={newGoal.name} onChange={e=>setNewGoal(g=>({...g,name:e.target.value}))} placeholder="House down payment…" /></div>
            <div className="form-group" style={{marginBottom:0}}><label>Target Amount ($)</label>
              <input type="number" min="0" value={newGoal.targetAmount} onChange={e=>setNewGoal(g=>({...g,targetAmount:e.target.value}))} /></div>
            <div className="form-group" style={{marginBottom:0}}><label>Target Date</label>
              <input type="date" value={newGoal.targetDate} onChange={e=>setNewGoal(g=>({...g,targetDate:e.target.value}))} /></div>
            <div className="form-group" style={{marginBottom:0}}>
              <label>Already Saved ($) <button type="button" style={{fontSize:10,color:'#63b3ed',background:'none',border:'none',cursor:'pointer',padding:0,marginLeft:4}}
