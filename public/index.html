              <input type="number" min="0" value={newGoal.currentSaved} onChange={e=>setNewGoal(g=>({...g,currentSaved:e.target.value}))} /></div>
            <div className="form-group" style={{marginBottom:0}}><label>Priority</label>
              <select value={newGoal.priority} onChange={e=>setNewGoal(g=>({...g,priority:e.target.value}))}>

        <div className="card tc gray" style={{padding:40}}>

      <div className="grid g2 gap-4">
        {enriched.map(g => {
          const alloc   = allocations[g.id] || 0;
          const proj    = projMonths(g);

          const isMet   = g.remaining <= 0;
          const statusColor = isMet ? '#68d391' : isLate ? '#fc8181' : '#68d391';

          return (
            <div key={g.id} className="card" style={{border:`1px solid ${isMet?'#276749':isLate?'#9b2c2c':'#2d3748'}`}}>

                    <div className="form-group" style={{marginBottom:0}}><label>Saved ($)</label>
                      <input type="number" min="0" value={editData.currentSaved} onChange={e=>setEditData(d=>({...d,currentSaved:e.target.value}))} /></div>
                    <div className="form-group" style={{marginBottom:0}}><label>Priority</label>
                      <select value={editData.priority} onChange={e=>setEditData(d=>({...d,priority:e.target.value}))}>

                    <button className="btn btn-success btn-sm" onClick={saveEdit}>Save</button>

                <>
                  <div className="flex items-center justify-between mb-3">
                    <div>
                      <div className="bold" style={{fontSize:15}}>{g.name}</div>
                      <div style={{fontSize:12,color:'#718096'}}>
                        {isMet ? '✓ Complete' : `${g.targetDate ? fmtDate(g.targetDate) : '—'} · ${g.months} months away`}
                      </div>
                    </div>
                    <div className="flex gap-2 items-center">
                      <span className={`badge ${g.priority==='high'?'b-red':g.priority==='medium'?'b-yellow':'b-blue'}`}>{g.priority}</span>
                      <button className="btn btn-secondary btn-sm" onClick={()=>startEdit(g)}>Edit</button>
                      <button className="btn btn-danger btn-sm" onClick={()=>removeGoal(g.id)}>×</button>
                    </div>
                  </div>

                  <div className="progress-track mb-1">
                    <div className="progress-fill" style={{width:`${g.pct}%`,background:isMet?'#68d391':'#3182ce'}} />
                  </div>
                  <div className="flex justify-between mb-3" style={{fontSize:12}}>
                    <span className="gray">{fmtFull(g.saved)} saved</span>
                    <span className="bold">{g.pct.toFixed(0)}%</span>
                    <span className="gray">{fmtFull(g.targetAmt)} goal</span>
                  </div>

                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,fontSize:12}}>
                    <div style={{background:'#0f1117',borderRadius:6,padding:'8px 10px'}}>
                      <div style={{color:'#718096',marginBottom:2}}>Remaining</div>
                      <div className="bold">{fmtFull(g.remaining)}</div>
                    </div>
                    <div style={{background:'#0f1117',borderRadius:6,padding:'8px 10px'}}>
                      <div style={{color:'#718096',marginBottom:2}}>Needed/mo (to hit date)</div>
                      <div className="bold">{isFinite(g.monthlyNeeded)?fmtFull(g.monthlyNeeded):'past due'}</div>
                    </div>
                    <div style={{background:'#0f1117',borderRadius:6,padding:'8px 10px'}}>
                      <div style={{color:'#718096',marginBottom:2}}>Allocated from budget</div>
                      <div className="bold" style={{color:'#63b3ed'}}>{fmtFull(alloc)}/mo</div>
                    </div>
                    <div style={{background:'#0f1117',borderRadius:6,padding:'8px 10px'}}>
                      <div style={{color:'#718096',marginBottom:2}}>Projected completion</div>
                      <div className="bold" style={{color:statusColor}}>
                        {isMet ? 'Done!' : !isFinite(proj) ? 'No funds allocated' : isLate
                          ? `${proj} mo (${proj - g.months} mo late)`
                          : `${proj} mo (on time)`}
                      </div>
                    </div>
                  </div>

                  {!isMet && isLate && isFinite(g.monthlyNeeded) && (
                    <div style={{marginTop:10,fontSize:12,color:'#f6ad55',background:'#1a1200',borderRadius:6,padding:'8px 10px'}}>
                      Need {fmtFull(g.monthlyNeeded - alloc)} more/mo to hit this on time — increase budget or push the deadline.
                    </div>
                  )}
                </>
              )}
            </div>
          );
        })}
      </div>

      {/* ── Overview chart ── */}
      {enriched.length > 0 && (
        <div className="card mt-6">
          <div className="section-title">Progress Overview</div>
          <ResponsiveContainer width="100%" height={180}>
            <BarChart data={enriched.map(g=>({
              name: g.name.length>12?g.name.slice(0,12)+'…':g.name,
              saved: Math.round(g.saved),
              remaining: Math.round(g.remaining),
            }))} margin={{top:5,right:20,bottom:5,left:10}}>
              <CartesianGrid strokeDasharray="3 3" stroke="#2d3748" />
              <XAxis dataKey="name" tick={{fill:'#a0aec0',fontSize:11}} axisLine={false} tickLine={false} />
              <YAxis tickFormatter={v=>fmt(v)} tick={{fill:'#718096',fontSize:11}} axisLine={false} tickLine={false} />
              <Tooltip formatter={v=>fmtFull(v)} contentStyle={{background:'#1a1f2e',border:'1px solid #2d3748',borderRadius:6,fontSize:12}} />
              <Legend iconSize={10} wrapperStyle={{fontSize:11}} />
              <Bar dataKey="saved" name="Saved" stackId="a" fill="#68d391" radius={[0,0,0,0]} />
              <Bar dataKey="remaining" name="Remaining" stackId="a" fill="#2d3748" radius={[4,4,0,0]} />
            </BarChart>
          </ResponsiveContainer>
        </div>
      )}
    </div>
  );
}

function ModelsTab({ state }) {
  const { profile, assets, cash, livePrices, liabilities, goals } = state;
  const currentAge = +(profile.age || 30);

  // ── Pull real financial data ──────────────────────────────────────────────
  const totalPortfolio = useMemo(() =>
    assets.reduce((s,a) => s + (livePrices[a.ticker]?.price || a.costBasis) * a.shares, 0),
  [assets, livePrices]);
  const totalCash     = useMemo(() => cash.reduce((s,c) => s + c.amount, 0), [cash]);
  const totalDebt     = useMemo(() => liabilities.reduce((s,l) => s + l.balance, 0), [liabilities]);
  const netWorth      = totalPortfolio + totalCash - totalDebt;
  const debtMinTotal  = useMemo(() => liabilities.reduce((s,l) => s + (+(l.minPayment||0)), 0), [liabilities]);

  // Budget tab settings (localStorage)
  const budgetData = useMemo(() => {
    try { return JSON.parse(localStorage.getItem('finpal_budget') || '{}'); } catch { return {}; }
  }, []);
  const grossMonthly  = Math.round((+(profile.annualIncome||0)) / 12);
  const estimatedTax  = budgetData.taxOverride != null
    ? Math.round(budgetData.taxOverride / 12)
    : (() => {
        const a = +(profile.annualIncome||0);
        const brackets = [[11600,0.10],[35550,0.12],[53375,0.22],[91425,0.24],[51775,0.32],[365625,0.35],[1e9,0.37]];
        let tax=0, rem=a;
        for (const [size,rate] of brackets){const t=Math.min(rem,size);tax+=t*rate;rem-=t;if(rem<=0)break;}
        return Math.round(tax/12);
      })();
  const housing    = budgetData.housing    ?? Math.round(grossMonthly * 0.30);
  const transport  = budgetData.transport  ?? Math.round(grossMonthly * 0.10);
  const food       = budgetData.food       ?? Math.round(grossMonthly * 0.12);
  const otherExp   = budgetData.other      ?? Math.round(grossMonthly * 0.08);
  const goalSavings = budgetData.goalSavings ?? Math.round(grossMonthly * 0.05);
  const totalExpenses = housing + transport + food + otherExp;
  const investable = grossMonthly - estimatedTax - totalExpenses - debtMinTotal - goalSavings;

  // ── Debt payoff ages → cashflow boosts ───────────────────────────────────
  const debtBoosts = useMemo(() => {
    return liabilities
      .map(l => {
        const r = (+(l.apr||0)) / 100 / 12;
        const B = +(l.balance||0);
        const P = +(l.minPayment||0);
        if (B <= 0 || P <= 0) return null;
        let months;
        if (r < 1e-9) {
          months = B / P;
        } else {
          const denom = Math.log(1 + r);
          const num   = Math.log(1 - r * B / P);
          if (!isFinite(num) || num >= 0) months = 600; // interest >= payment, never paid off
          else months = -num / denom;
        }
        months = Math.ceil(months);
        if (months > 600) return null;
        const payoffAge = +(currentAge + months / 12).toFixed(1);
        if (payoffAge >= (profile.age ? 65 : 65)) return null;
        return { age: payoffAge, amount: P, label: `${l.name} paid off`, type: 'debt' };
      })
      .filter(Boolean)
      .sort((a, b) => a.age - b.age);
  }, [liabilities, currentAge]);

  // ── Goal deadline ages → cashflow boosts ─────────────────────────────────
  const goalBoosts = useMemo(() => {
    if (!goalSavings || !goals.length) return [];
    // Simple: when a goal's target date passes, its allocation share frees up
    const totalNeededPerGoal = goals.map(g => {
      const remaining = Math.max(0, (+(g.targetAmount||g.target_amount||0)) - (+(g.currentSaved||g.current_saved||0)));
      return remaining;
    });
    const totalRemaining = totalNeededPerGoal.reduce((s,v)=>s+v, 0);
    return goals.map((g, i) => {
      const targetDate = g.targetDate || g.target_date;
      if (!targetDate) return null;
      const months = monthsBetween(new Date(), targetDate);
      if (months <= 0) return null;
      const goalAge = +(currentAge + months / 12).toFixed(1);
      const share = totalRemaining > 0 ? (totalNeededPerGoal[i] / totalRemaining) * goalSavings : goalSavings / goals.length;
      return { age: goalAge, amount: Math.round(share), label: `"${g.name}" funded`, type: 'goal' };
    }).filter(Boolean).sort((a, b) => a.age - b.age);
  }, [goals, goalSavings, currentAge]);

  const allBoosts = useMemo(() => [...debtBoosts, ...goalBoosts].sort((a,b) => a.age - b.age), [debtBoosts, goalBoosts]);

  // ── State ─────────────────────────────────────────────────────────────────
  const defaultContrib = Math.max(100, investable > 0 ? investable : Math.round((+(profile.annualIncome||100000)) * 0.15 / 12));
  const [mcParams, setMcParams] = useState({
    retirementAge: 65,
    monthlyContribution: defaultContrib,
    withdrawalRate: 4,
    colaRate: 2,
    selectedProfile: null,
    useRealData: true,
  });
  const [milestones, setMilestones] = useState([]);
  const [mcResult, setMcResult] = useState(null);
  const [running, setRunning] = useState(false);

  // Live-data toggle: when on, use budget-derived investable + net worth as starting point
  const effectiveContrib  = mcParams.useRealData && investable > 0 ? investable : mcParams.monthlyContribution;
  const effectiveSavings  = mcParams.useRealData ? netWorth : totalPortfolio + totalCash;
  const annualWR          = mcParams.withdrawalRate / 100;
  const yearsToRetirement = Math.max(1, mcParams.retirementAge - currentAge);

  const sortedMilestones = useMemo(() => [...milestones].sort((a,b) => a.age - b.age), [milestones]);

  const getContribAtAge = (age) => {
    const yrs = age - currentAge;
    if (yrs <= 0) return effectiveContrib;
    let mult = Math.pow(1 + mcParams.colaRate / 100, yrs);
    for (const m of sortedMilestones) { if (m.age <= age) mult *= (1 + m.salaryChangePct / 100); }
    const boost = allBoosts.filter(b => b.age <= age).reduce((s,b) => s + b.amount, 0);
    return effectiveContrib * mult + boost;
  };
  const contribAtRetirement = getContribAtAge(mcParams.retirementAge);

  const applyProfile = (profileId) => {
    const prof = CAREER_PROFILES.find(p => p.id === profileId);
    if (!prof) return;
    setMilestones(prof.milestones
      .filter(m => currentAge + m.yearsFromNow < mcParams.retirementAge)
      .map(m => ({ age: currentAge + m.yearsFromNow, label: m.label, salaryChangePct: m.salaryChangePct })));
    setMcParams(p => ({ ...p, selectedProfile: profileId }));
    setMcResult(null);
  };

  const addMilestone = () => {
    const nextAge = milestones.length > 0
      ? Math.min(mcParams.retirementAge - 1, Math.max(...milestones.map(m => m.age)) + 3)
      : currentAge + 5;
    setMilestones(m => [...m, { age: nextAge, label: '', salaryChangePct: 15 }]);
    setMcParams(p => ({ ...p, selectedProfile: 'custom' }));
    setMcResult(null);
  };
  const removeMilestone = (i) => { setMilestones(m => m.filter((_,j) => j !== i)); setMcResult(null); };
  const updateMilestone = (i, k, v) => { setMilestones(m => m.map((x,j) => j===i?{...x,[k]:v}:x)); setMcResult(null); };

  const runSim = () => {
    setRunning(true);
    setTimeout(() => {
      setMcResult(runMonteCarlo({
        currentAge, retirementAge: mcParams.retirementAge,
        currentSavings: effectiveSavings, monthlyContribution: effectiveContrib,
        milestones: sortedMilestones, cashflowBoosts: allBoosts,
        colaRate: mcParams.colaRate / 100,
        annualReturnMean: 0.07, annualReturnStd: 0.15, runs: 1000,
      }));
      setRunning(false);
    }, 50);
  };

  const scenarios = useMemo(() => [
    { label:'Bear (-2%)',         mean:-0.02 },
    { label:'Conservative (4%)', mean: 0.04 },
    { label:'Base (7%)',          mean: 0.07 },
    { label:'Bull (10%)',         mean: 0.10 },
    { label:'Optimistic (12%)',   mean: 0.12 },
  ].map(s => {
    const r = runMonteCarlo({
      currentAge, retirementAge: mcParams.retirementAge,
      currentSavings: effectiveSavings, monthlyContribution: effectiveContrib,
      milestones: sortedMilestones, cashflowBoosts: allBoosts,
      colaRate: mcParams.colaRate / 100, annualReturnMean: s.mean, annualReturnStd: 0.15, runs: 300,
    });
    return { ...s, median: r.p50, income: r.p50 * annualWR };
  }), [currentAge, mcParams, effectiveSavings, effectiveContrib, annualWR, sortedMilestones, allBoosts]);

  return (
    <div>
      {/* ── Simulation Inputs banner ── */}
      <div className="card mb-6" style={{background:'#0a1628',border:'1px solid #2a4a7f'}}>
        <div className="flex items-center justify-between mb-3">
          <div className="section-title" style={{marginBottom:0,color:'#63b3ed'}}>Simulation Inputs</div>
          <label style={{display:'flex',alignItems:'center',gap:8,fontSize:12,cursor:'pointer'}}>
            <input type="checkbox" checked={mcParams.useRealData}
              onChange={e=>setMcParams(p=>({...p,useRealData:e.target.checked}))} />
            <span style={{color:'#a0aec0'}}>Use live app data</span>
          </label>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(150px,1fr))',gap:10}}>
          {[
            ['Starting NW',         fmtFull(effectiveSavings),  mcParams.useRealData?'assets + cash − debt':'portfolio + cash',  '#63b3ed'],
            ['Investable/mo',       fmtFull(effectiveContrib),  mcParams.useRealData?'from Budget tab':'manual override',         investable<0&&mcParams.useRealData?'#fc8181':'#68d391'],
            ['Debt payments/mo',    fmtFull(debtMinTotal),      'auto from Debt tab',                                             '#f6ad55'],
            ['Goal savings/mo',     fmtFull(goalSavings),       'from Budget tab',                                                '#b794f4'],
          ].map(([label,val,sub,color]) => (
            <div key={label} style={{background:'#0f1a2e',borderRadius:6,padding:'10px 12px'}}>
              <div style={{fontSize:11,color:'#4a7fb5',marginBottom:3}}>{label}</div>
              <div style={{fontSize:15,fontWeight:700,color}}>{val}</div>
              <div style={{fontSize:10,color:'#4a5568',marginTop:2}}>{sub}</div>
            </div>
          ))}
        </div>
        {!mcParams.useRealData && (
          <div className="grid g2 gap-4" style={{marginTop:12}}>
            <div className="form-group" style={{marginBottom:0}}>
              <label style={{fontSize:11}}>Monthly contribution ($)</label>
              <input type="number" min={0} value={mcParams.monthlyContribution}
                onChange={e=>setMcParams(p=>({...p,monthlyContribution:+e.target.value}))} />
            </div>
          </div>
        )}
        {investable < 0 && mcParams.useRealData && (
          <div style={{marginTop:10,fontSize:12,color:'#fc8181',padding:'6px 10px',background:'#1a0a0a',borderRadius:6}}>
            Budget tab shows {fmtFull(Math.abs(investable))}/mo shortfall — go to Budget to fix expenses first.
          </div>
        )}
      </div>

      <div className="grid g2 gap-6">
        {/* ── Left column ── */}
        <div>
          {/* Career profile picker */}
          <div className="card mb-4">
            <div className="section-title" style={{marginBottom:6}}>Career Profile</div>
            <div style={{fontSize:12,color:'#718096',marginBottom:10}}>Seed your promotion timeline — edit rows below.</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
              {CAREER_PROFILES.map(p => (
                <button key={p.id} className={`btn btn-sm ${mcParams.selectedProfile===p.id?'btn-primary':'btn-secondary'}`}
                  onClick={() => applyProfile(p.id)}>{p.icon} {p.label}</button>
              ))}
            </div>
          </div>

          {/* Career milestones */}
          <div className="card mb-4">
            <div className="flex items-center justify-between mb-3">
              <div>
                <div className="section-title" style={{marginBottom:2}}>Career Milestones</div>
                <div style={{fontSize:11,color:'#718096'}}>Salary jumps → raises investment contributions from that age on.</div>
              </div>
              <button className="btn btn-secondary btn-sm" onClick={addMilestone}>+ Add</button>
            </div>
            {milestones.length === 0 ? (
              <div style={{fontSize:13,color:'#718096',padding:'8px 0'}}>No milestones — pick a career profile or add rows manually.</div>
            ) : (
              <table>
                <thead><tr><th>Age</th><th>Event</th><th>Salary ↑</th><th>Contrib at age</th><th></th></tr></thead>
                <tbody>
                  {sortedMilestones.map(m => {
                    const origIdx = milestones.indexOf(m);
                    return (
                      <tr key={origIdx}>
                        <td><input type="number" min={currentAge+1} max={mcParams.retirementAge-1}
                          value={m.age} onChange={e=>updateMilestone(origIdx,'age',+e.target.value)} style={{width:60}} /></td>
                        <td><input value={m.label} onChange={e=>updateMilestone(origIdx,'label',e.target.value)}
                          placeholder="Senior Engineer" style={{minWidth:130}} /></td>

function buildContext(state) {
  const { profile, assets, liabilities, cash, goals, livePrices } = state;
  const totalPortfolio = assets.reduce((s,a)=>s+(livePrices[a.ticker]?.price||a.costBasis)*a.shares,0);
  const totalCash = cash.reduce((s,c)=>s+c.amount,0);
  const totalDebt = liabilities.reduce((s,l)=>s+l.balance,0);
  const netWorth  = totalPortfolio + totalCash - totalDebt;
  const assetLines = assets.map(a=>{
    const price = livePrices[a.ticker]?.price||a.costBasis;
    const val = price*a.shares;
    const gainPct = a.costBasis>0?((val-a.costBasis*a.shares)/(a.costBasis*a.shares)*100).toFixed(1):'N/A';
    return `  - ${a.ticker} (${a.assetType}): ${a.shares} shares @ $${price.toFixed(2)} = $${val.toFixed(0)} [${gainPct}% gain, ${a.accountType}]`;
  }).join('\n');
  const liabilityLines = liabilities.map(l=>`  - ${l.name} (${l.type}): $${l.balance.toFixed(0)} @ ${l.apr}% APR, min $${l.minPayment}/mo`).join('\n');
  const cashLines = cash.map(c=>`  - ${c.name}: $${c.amount.toFixed(0)} @ ${c.apy}% APY`).join('\n');
  const goalLines = goals.map(g=>{
    const mo = monthsBetween(new Date(), g.targetDate);
    const rem = Math.max(0,g.targetAmount-g.currentSaved);
    return `  - ${g.name}: $${g.currentSaved.toFixed(0)}/$${g.targetAmount.toFixed(0)} saved (${mo} months to target), needs $${mo>0?(rem/mo).toFixed(0):rem}/mo`;
  }).join('\n');
  return `USER FINANCIAL PROFILE:
Name: ${profile.name} | Age: ${profile.age} | Income: $${(profile.annualIncome||0).toLocaleString()}/yr | Tax Rate: ${profile.marginalTaxRateOverride ?? calcMarginalRate(profile.annualIncome, profile.filingStatus)}%
Risk Tolerance: ${profile.riskTolerance}/5 | Primary Goal: ${profile.primaryGoal}

NET WORTH: $${netWorth.toFixed(0)}
  Portfolio: $${totalPortfolio.toFixed(0)}
  Cash: $${totalCash.toFixed(0)}
  Total Debt: $${totalDebt.toFixed(0)}

INVESTMENT PORTFOLIO:
${assetLines||'  (none)'}

LIABILITIES:
${liabilityLines||'  (none)'}

CASH & SAVINGS:
${cashLines||'  (none)'}

FINANCIAL GOALS:
${goalLines||'  (none)'}`.trim();
}

function AgentsTab({ state, dispatch }) {
  const { apiKeys, agentResults, agentStatus, agentChat, agentUpdatedAt } = state;
  const agentResultsRef = useRef(agentResults);
  useEffect(() => { agentResultsRef.current = agentResults; }, [agentResults]);
  const agentChatRef = useRef(agentChat);
  useEffect(() => { agentChatRef.current = agentChat; }, [agentChat]);

  const [running, setRunning] = useState(false);
  const [chatInput, setChatInput] = useState('');
  const [chatLoading, setChatLoading] = useState(false);
  const chatRef = useRef(null);

  useEffect(() => {
    if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
  }, [agentChat]);

  const ctx = useMemo(() => buildContext(state), [state]);

  const runHealthCheck = useCallback(async () => {
    if (!apiKeys.anthropic || running) return;
    setRunning(true);
    dispatch({ type:'CLEAR_AGENTS' });
    dispatch({ type:'SET_AGENT_STATUS', id:'synthesis', status:'running' });

    const specialistContext = AGENT_DEFS.map(d =>
      `- ${d.name}: ${d.instruction}`
    ).join('\n');

    const prompt = `Analyze ${state.profile.name}'s complete financial picture and write a single cohesive financial health report — not separate sections, but one flowing advisor narrative that weaves together portfolio, debt, tax, retirement, risk, and macro insights as they relate to each other.

Before the narrative, output the grades block EXACTLY in this format (required for the dashboard):
Portfolio: [A-F]
Debt: [A-F]
Tax: [A-F]
Retirement: [A-F]
Risk: [A-F]
Macro: [A-F]

Then write the report as one flowing piece. Cover these dimensions naturally within the narrative (do not use them as section headers):
${specialistContext}

End with:

**Your 3 priorities this month:**
1. [Specific action — dollar amounts, account names, exact numbers]
2. [Specific action]
3. [Specific action]

Use actual numbers throughout. Be direct. Write as a trusted advisor who knows this person's finances deeply, not as a compliance document.`;

    let attempt = 0, result = null;
    while (attempt < 3 && result === null) {
      if (attempt > 0) await sleep(attempt * 5000);
      try {
        result = await callAPI(
          [{ role: 'user', content: prompt }],
          `You are a rigorous financial advisory team for ${state.profile.name}. Every recommendation must cite actual numbers from the data provided. Do not hedge. ${ctx}`,
          apiKeys.anthropic, 2500
        );
      } catch(e) {
        attempt++;
        if (attempt >= 3) {
          dispatch({ type:'SET_AGENT_STATUS', id:'synthesis', status:'error' });
          setRunning(false);
          return;
        }
      }
    }

    dispatch({ type:'SET_AGENT_RESULT', id:'synthesis', result });
    dispatch({ type:'SET_AGENT_STATUS', id:'synthesis', status:'done' });
    dispatch({ type:'SET_AGENT_UPDATED_AT', updatedAt: new Date().toISOString() });
    setRunning(false);
    const ts = new Date().toISOString();
    apiPost('/api/agent-cache', { results: { synthesis: result }, chat: agentChatRef.current, updatedAt: ts }).catch(()=>{});
  }, [apiKeys.anthropic, running, state.profile.name, ctx]);

  const sendChat = useCallback(async (msg) => {
    if (!msg.trim()||!apiKeys.anthropic||chatLoading) return;
    const history = [...agentChat, {role:'user',content:msg}];
    dispatch({ type:'SET_AGENT_CHAT', chat:history });
    setChatInput(''); setChatLoading(true);
    try {
      const reply = await callAPI(history, `You are FinPal, a personal financial advisor. Be specific, data-driven, and actionable. Always reference their actual numbers.\n\n${ctx}`, apiKeys.anthropic, 1000);
      const updatedChat = [...history,{role:'assistant',content:reply}];
      dispatch({ type:'SET_AGENT_CHAT', chat:updatedChat });
      apiPost('/api/agent-cache', { results: agentResultsRef.current, chat: updatedChat, updatedAt: agentUpdatedAt || new Date().toISOString() }).catch(()=>{});
    } catch(e) { dispatch({ type:'SET_AGENT_CHAT', chat:[...history,{role:'assistant',content:`Error: ${e.message}`}] }); }
    setChatLoading(false);
  }, [apiKeys.anthropic, agentChat, agentResults, chatLoading, ctx]);

  const CHIPS = ['Am I on track for retirement?','Which debt should I pay first?','What should I invest $500/month in?','How can I reduce my taxes?','What is my biggest financial risk?'];

  const hasSynthesis = !!agentResults.synthesis;
  const isRunning = agentStatus.synthesis === 'running';

  if (!apiKeys.anthropic) {
    return (
      <div className="card tc" style={{padding:40}}>
        <div style={{fontSize:32,marginBottom:12}}>🤖</div>
        <div className="bold" style={{fontSize:16,marginBottom:8}}>Anthropic API Key Required</div>
        <div className="gray" style={{fontSize:13}}>Add your Anthropic API key in Settings to use the AI health check and advisor chat.</div>
      </div>
    );
  }

  return (
    <div>
      {/* Header */}
      <div className="flex items-center justify-between mb-6">
        <div>
          <div className="bold" style={{fontSize:15}}>AI Financial Health Check</div>
          <div style={{fontSize:12,color:'#718096'}}>
            {AGENT_DEFS.map(d=>d.icon).join(' ')} Portfolio · Debt · Tax · Retirement · Risk · Macro
          </div>
        </div>
        <button className="btn btn-primary" onClick={runHealthCheck} disabled={running}>
          {running
            ? <span className="flex items-center gap-2"><span className="spinner"/>Analyzing…</span>
            : hasSynthesis ? '↻ Re-run Health Check' : '▶ Run Health Check'}
        </button>
      </div>

      {/* Report */}
      {isRunning && (
        <div className="card mb-4" style={{textAlign:'center',padding:32}}>
          <div style={{color:'#63b3ed',fontSize:14,marginBottom:8}}>● Running analysis across all 6 specialist areas…</div>
          <div style={{color:'#4a5568',fontSize:12}}>Portfolio · Debt · Tax · Retirement · Risk · Macro</div>
        </div>
      )}
      {!isRunning && hasSynthesis && (
        <div className="card mb-6">
          <RenderedText text={agentResults.synthesis} />
        </div>
      )}
      {!isRunning && !hasSynthesis && (
        <div className="card mb-6" style={{border:'1px solid #2d3748',textAlign:'center',padding:40}}>
          <div style={{fontSize:36,marginBottom:12}}>🎖️</div>
          <div className="bold" style={{fontSize:15,marginBottom:8}}>Your financial health report will appear here</div>
          <div style={{color:'#718096',fontSize:13}}>Click "Run Health Check" to get a complete analysis across portfolio, debt, tax efficiency, retirement readiness, risk, and macro exposure.</div>
        </div>
      )}

      {/* Chat */}
      <div className="mt-4">
        <div className="section-title">Personal Advisor Chat</div>
        <div className="chat-wrap">
          <div className="chat-msgs" ref={chatRef}>
            {agentChat.length===0 && (
              <div className="gray tc" style={{fontSize:12,marginTop:20}}>Ask your personal advisor anything about your finances</div>
            )}
            {agentChat.map((m,i) => (
              <div key={i} className={`chat-msg ${m.role==='user'?'user':'ai'}`}>
                {m.role==='assistant'?<RenderedText text={m.content}/>:m.content}
              </div>
            ))}
            {chatLoading && <div className="chat-msg ai gray" style={{fontSize:12}}>Thinking…</div>}
          </div>
          <div style={{padding:'6px 10px',borderTop:'1px solid #2d3748',display:'flex',flexWrap:'wrap',gap:4}}>
            {CHIPS.map(chip=><span key={chip} className="chip" onClick={()=>sendChat(chip)}>{chip}</span>)}
          </div>
          <div className="chat-input">
            <input value={chatInput} onChange={e=>setChatInput(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&!e.shiftKey&&sendChat(chatInput)}
              placeholder="Ask about your finances… (Enter to send)" disabled={chatLoading} />
            <button className="btn btn-primary btn-sm" onClick={()=>sendChat(chatInput)} disabled={chatLoading||!chatInput.trim()}>Send</button>
          </div>
        </div>
      </div>
    </div>
  );
}

              <option value="head_of_household">Head of Household</option>
            </select></div>
        </div>
        {(() => {
          const rate = prof.marginalTaxRateOverride != null
            ? prof.marginalTaxRateOverride
            : calcMarginalRate(prof.annualIncome, prof.filingStatus);
          return (
            <div style={{background:'#0f1117',border:'1px solid #2d3748',borderRadius:6,padding:'8px 12px',marginTop:8,fontSize:12}}>
              <span style={{color:'#a0aec0'}}>Federal marginal rate: </span>
              <span className="bold blue">{rate}%</span>
              <span style={{color:'#718096'}}> · </span>
              <label style={{cursor:'pointer',color:'#63b3ed'}}>
                <input type="checkbox" style={{marginRight:4}} checked={prof.marginalTaxRateOverride!=null}
                  onChange={e=>setProf(p=>({...p,marginalTaxRateOverride:e.target.checked?rate:null}))} />
                Override
              </label>
              {prof.marginalTaxRateOverride!=null && (
                <input type="number" min="0" max="60" step="1" value={prof.marginalTaxRateOverride}
                  onChange={e=>setProf(p=>({...p,marginalTaxRateOverride:+e.target.value}))}
                  style={{width:55,marginLeft:8}} />
              )}
            </div>
          );
        })()}

        <div className="flex justify-between" style={{marginTop:20}}>
          <button className="btn btn-danger btn-sm" onClick={logout}>Log Out</button>
          <button className="btn btn-primary" onClick={save} disabled={saving}>{saving?'Saving…':'Save Changes'}</button>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [authUser, setAuthUser]     = useState(null);
  const [authChecked, setAuthChecked] = useState(false);
  const [state, dispatch]           = useReducer(reducer, BLANK);
  const [showSettings, setShowSettings] = useState(false);
  const [showLanding, setShowLanding] = React.useState(true);

  useEffect(() => {
    apiGet('/api/auth/me')
      .then(d => {
        if (d.user) { setAuthUser(d.user); return apiGet('/api/me/data'); }
        return null;
      })
      .then(data => { if (data) dispatch({ type:'HYDRATE', payload:data }); setAuthChecked(true); })
      .catch(() => setAuthChecked(true));
  }, []);

  useEffect(() => {
    const handler = (e) => dispatch({ type:'SET_TAB', tab: e.detail });
    window.addEventListener('finpal-nav', handler);
    return () => window.removeEventListener('finpal-nav', handler);
  }, [dispatch]);

  const handleLogin = async (user) => {
    setAuthUser(user);
    try { const data = await apiGet('/api/me/data'); dispatch({ type:'HYDRATE', payload:data }); } catch(e) {}
  };

  const handleLogout = () => {
    setAuthUser(null);
    dispatch({ type:'HYDRATE', payload:{ profile:{}, assets:[], liabilities:[], cash:[], goals:[], apiKeys:BLANK.apiKeys, snapshots:[] }});
  };

  const handleSetupComplete = (data) => {
    dispatch({ type:'HYDRATE', payload:{ ...data, profile:{ ...data.profile, setupComplete:true } }});
  };

  if (!authChecked) return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',background:'#0f1117'}}>
      <div className="spinner" style={{width:32,height:32,borderWidth:3}} />
    </div>
  );

  if (!authUser) {
    if (showLanding) return <LandingPage onGetStarted={() => setShowLanding(false)} />;
    return <LoginScreen onLogin={handleLogin} />;
  }
  if (!state.setupComplete) return <SetupWizard onComplete={handleSetupComplete} />;

  const totalPortfolio = state.assets.reduce((s,a) => s+(state.livePrices[a.ticker]?.price||a.costBasis)*a.shares, 0);
  const totalCash  = state.cash.reduce((s,c)=>s+c.amount, 0);
  const totalDebt  = state.liabilities.reduce((s,l)=>s+l.balance, 0);
  const netWorth   = totalPortfolio + totalCash - totalDebt;

  const tabContent = () => {
    switch (state.activeTab) {
      case 'Net Worth':  return <NetWorthTab state={state} dispatch={dispatch} />;
      case 'Portfolio':  return <PortfolioTab state={state} dispatch={dispatch} />;
      case 'Debt':       return <DebtTab state={state} dispatch={dispatch} />;
      case 'Budget':     return <BudgetTab state={state} />;
      case 'Goals':      return <GoalsTab state={state} dispatch={dispatch} />;
      case 'Models':     return <ModelsTab state={state} />;
      case 'AI Agents':  return <AgentsTab state={state} dispatch={dispatch} />;
      default:           return null;
    }
  };

  return (
    <div className="app">
      <div className="header">
        <div style={{fontSize:20,marginRight:4}}>💰</div>
        <h1>FinPal</h1>
        {state.profile.name && <span style={{fontSize:13,color:'#718096'}}>— {state.profile.name}</span>}
        <div className="header-stats">
          <div className="header-stat"><div className="lbl">Net Worth</div><div className="val" style={{color:netWorth>=0?'#68d391':'#fc8181'}}>{fmt(netWorth)}</div></div>
          <div className="header-stat"><div className="lbl">Portfolio</div><div className="val">{fmt(totalPortfolio)}</div></div>
          <div className="header-stat"><div className="lbl">Debt</div><div className="val red">{fmt(totalDebt)}</div></div>
        </div>
        <button className="btn btn-secondary btn-sm" style={{marginLeft:8}} onClick={()=>setShowSettings(true)}>⚙ Settings</button>
      </div>
      <div className="tabs">
        {TABS.map(t=>(
          <div key={t} className={`tab ${state.activeTab===t?'active':''}`} onClick={()=>dispatch({type:'SET_TAB',tab:t})}>{t}</div>
        ))}
      </div>
      <div className="content">{tabContent()}</div>
      {showSettings && <SettingsModal state={state} dispatch={dispatch} onLogout={handleLogout} onClose={()=>setShowSettings(false)} />}
    </div>
  );
}

try {
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
} catch(e) {
  console.error('FinPal render error:', e);
  document.getElementById('root').innerHTML =
    '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;color:#fc8181;background:#0f1117;flex-direction:column;gap:12px">' +
    '<div style="font-size:20px">⚠ App failed to start: ' + e.message + '</div>' +
    '<div style="color:#718096;font-size:11px">Open browser console (F12) for details.</div></div>';
}
</script>
</body>
