// GOALS TAB
// =============================================================================
function GoalsTab({ state, dispatch }) {
  const { goals } = state;
  const topGoal = goals && (goals.find(g=>g.priority==='high') || goals[0]);
  const [showAdd, setShowAdd] = useState(false);
  const [newGoal, setNewGoal] = useState({ name:'', targetAmount:0, targetDate:'', currentSaved:0, priority:'medium' });
  const [addErr, setAddErr] = useState('');
  const [editSaved, setEditSaved] = useState({});
  const today = new Date();

  const addGoal = async () => {
    if (!newGoal.name.trim() || !newGoal.targetDate) return setAddErr('Name and target date required');
    setAddErr('');
    try {
      const saved = await apiPost('/api/goals', {
        ...newGoal, targetAmount:+newGoal.targetAmount, currentSaved:+newGoal.currentSaved,
      });
      dispatch({ type:'ADD_GOAL', item:saved });
      setNewGoal({ name:'', targetAmount:0, targetDate:'', currentSaved:0, priority:'medium' });
      setShowAdd(false);
    } catch(e) { setAddErr(e.message); }
  };

  const removeGoal = async (id) => {
    try { await apiDelete(`/api/goals/${id}`); dispatch({ type:'REMOVE_GOAL', id }); } catch(e) {}
  };

  const updateSaved = async (g) => {
    const val = parseFloat(editSaved[g.id]);
    if (isNaN(val)) return;
    try {
      const updated = await apiPut(`/api/goals/${g.id}`, {...g, currentSaved:val});
      dispatch({ type:'UPDATE_GOAL', id:g.id, data:updated });
      setEditSaved(s => { const n={...s}; delete n[g.id]; return n; });
    } catch(e) {}
  };

  return (
    <div>
      {topGoal && (() => {
        const targetDate = topGoal.targetDate || topGoal.target_date;
        const targetAmt = +(topGoal.targetAmount ?? topGoal.target_amount ?? 0);
        const saved = +(topGoal.currentSaved ?? topGoal.current_saved ?? 0);
        const now = new Date();
        const end = targetDate ? new Date(targetDate) : null;
        const mLeft = end ? Math.max(0,(end.getFullYear()-now.getFullYear())*12+end.getMonth()-now.getMonth()) : 0;
        const needed = mLeft > 0 ? Math.max(0,targetAmt-saved)/mLeft : 0;
        const capacity = (state.profile?.annualIncome||state.profile?.annual_income||0)/12*0.2;
        const onTrack = capacity > 0 && needed <= capacity;
        return (
          <div className="card mb-4" style={{background:onTrack?'#0f1a0f':'#1a0f0f',border:`1px solid ${onTrack?'#276749':'#9b2c2c'}`}}>
            <div style={{fontSize:13,color:'#e2e8f0',lineHeight:1.6}}>
              <strong>{topGoal.name}:</strong>{' '}
              {onTrack
                ? <span style={{color:'#68d391'}}>You're on track — {fmtFull(needed)}/mo needed is within your estimated savings capacity.</span>
                : <span style={{color:'#f6ad55'}}>You need {fmtFull(needed)}/mo to stay on track. Consider increasing contributions or adjusting your timeline.</span>}
            </div>
          </div>
        );
      })()}
      <div className="flex items-center justify-between mb-4">
        <div className="section-title" style={{marginBottom:0}}>Financial Goals</div>
        <button className="btn btn-primary btn-sm" onClick={()=>setShowAdd(v=>!v)}>
          {showAdd?'Cancel':'+ Add Goal'}
        </button>
      </div>

      {showAdd && (
        <div className="card mb-6">
          <div className="grid g2 gap-4 mb-4" style={{alignItems:'end'}}>
            <div className="form-group" style={{marginBottom:0}}><label>Goal Name</label>
              <input value={newGoal.name} onChange={e=>setNewGoal(g=>({...g,name:e.target.value}))} placeholder="Down payment…" /></div>
            <div className="form-group" style={{marginBottom:0}}><label>Target Amount ($)</label>
              <input type="number" min="0" value={newGoal.targetAmount} onChange={e=>setNewGoal(g=>({...g,targetAmount:e.target.value}))} /></div>
            <div className="form-group" style={{marginBottom:0}}><label>Target Date</label>
              <input type="date" value={newGoal.targetDate} onChange={e=>setNewGoal(g=>({...g,targetDate:e.target.value}))} /></div>
            <div className="form-group" style={{marginBottom:0}}><label>Already Saved ($)</label>
              <input type="number" min="0" value={newGoal.currentSaved} onChange={e=>setNewGoal(g=>({...g,currentSaved:e.target.value}))} /></div>
            <div className="form-group" style={{marginBottom:0}}><label>Priority</label>
              <select value={newGoal.priority} onChange={e=>setNewGoal(g=>({...g,priority:e.target.value}))}>
                <option value="high">High</option><option value="medium">Medium</option><option value="low">Low</option>
              </select></div>
          </div>
          {addErr && <div style={{fontSize:12,color:'#fc8181',marginBottom:8}}>{addErr}</div>}
          <button className="btn btn-success" onClick={addGoal}>Add Goal</button>
        </div>
      )}

      {goals.length === 0 && !showAdd && (
        <div className="card tc gray" style={{padding:40}}>No goals set — click "+ Add Goal" to start</div>
      )}

      <div className="grid g2 gap-4">
        {goals.map(g => {
          const months = monthsBetween(today, g.targetDate);
          const remaining = Math.max(0, g.targetAmount - g.currentSaved);
          const monthlyNeeded = months > 0 ? remaining/months : remaining;
          const pct = g.targetAmount > 0 ? Math.min(100, g.currentSaved/g.targetAmount*100) : 0;
          const onTrack = monthlyNeeded < (state.profile.annualIncome/12*0.2);
          const isEditing = editSaved[g.id] !== undefined;

          return (
            <div key={g.id} className="card">
              <div className="flex items-center justify-between mb-2">
                <div>
                  <div className="bold" style={{fontSize:15}}>{g.name}</div>
                  <div style={{fontSize:12,color:'#718096'}}>Target: {fmtDate(g.targetDate)} · {months} months away</div>
                </div>
                <div className="flex gap-2 items-center">
                  <span className={`badge ${g.priority==='high'?'b-red':g.priority==='medium'?'b-yellow':'b-blue'}`}>{g.priority}</span>
                  <button className="btn btn-danger btn-sm" onClick={()=>removeGoal(g.id)}>×</button>
                </div>
              </div>
              <div className="progress-track mb-2">
                <div className="progress-fill" style={{width:`${pct}%`,background:pct>=100?'#68d391':'#3182ce'}} />
              </div>
              <div className="flex justify-between" style={{fontSize:12}}>
                <span className="gray">{fmtFull(g.currentSaved)} saved</span>
                <span className="bold">{pct.toFixed(0)}%</span>
                <span className="gray">{fmtFull(g.targetAmount)} goal</span>
              </div>
              <hr className="divider" />
              <div className="grid g2 gap-2" style={{fontSize:12}}>
                <div><span className="gray">Remaining: </span><span className="bold">{fmtFull(remaining)}</span></div>
                <div><span className="gray">Monthly needed: </span>
                  <span className={`bold ${onTrack?'green':'yellow'}`}>{fmtFull(monthlyNeeded)}/mo</span>
                </div>
              </div>
              <div className="flex gap-2 items-center mt-2">
                <input type="number" min="0" placeholder="Update saved amount"
                  value={isEditing ? editSaved[g.id] : ''}
                  onChange={e=>setEditSaved(s=>({...s,[g.id]:e.target.value}))}
                  style={{flex:1,fontSize:12}} />
                {isEditing && <button className="btn btn-success btn-sm" onClick={()=>updateSaved(g)}>Update</button>}
              </div>
            </div>
          );
        })}
      </div>

      {goals.length > 0 && (
        <div className="card mt-4">
          <div className="section-title">Goals Progress Overview</div>
          <ResponsiveContainer width="100%" height={180}>
            <BarChart data={goals.map(g=>({
              name: g.name.length>12?g.name.slice(0,12)+'…':g.name,
              saved: g.currentSaved,
              remaining: Math.max(0,g.targetAmount-g.currentSaved),
            }))} margin={{top:5,right:20,bottom:5,left:10}}>
              <CartesianGrid strokeDasharray="3 3" stroke="#2d3748" />
              <XAxis dataKey="name" tick={{fill:'#a0aec0',fontSize:11}} axisLine={false} tickLine={false} />
              <YAxis tickFormatter={v=>fmt(v)} tick={{fill:'#718096',fontSize:11}} axisLine={false} tickLine={false} />
              <Tooltip formatter={v=>fmtFull(v)} contentStyle={{background:'#1a1f2e',border:'1px solid #2d3748',borderRadius:6,fontSize:12}} />
              <Legend iconSize={10} wrapperStyle={{fontSize:11}} />
              <Bar dataKey="saved" name="Saved" stackId="a" fill="#68d391" radius={[0,0,0,0]} />
              <Bar dataKey="remaining" name="Remaining" stackId="a" fill="#2d3748" radius={[4,4,0,0]} />
            </BarChart>
          </ResponsiveContainer>
        </div>
      )}
    </div>
  );
}

function ModelsTab({ state }) {
  const { profile, assets, liabilities, cash, livePrices } = state;
  const [mcParams, setMcParams] = useState({ retirementAge:65, monthlyContribution:2000, withdrawalRate:4, extraReturn:0 });
  const [mcResult, setMcResult] = useState(null);
  const [running, setRunning] = useState(false);

  const totalPortfolio = useMemo(() =>
    assets.reduce((s,a) => s + (livePrices[a.ticker]?.price||a.costBasis)*a.shares, 0) +
    cash.reduce((s,c)=>s+c.amount,0),
  [assets, livePrices, cash]);

  const runSim = () => {
    setRunning(true);
    setTimeout(() => {
      const result = runMonteCarlo({
        currentAge: profile.age,
        retirementAge: mcParams.retirementAge,
        currentSavings: totalPortfolio,
        monthlyContribution: mcParams.monthlyContribution,
        annualReturnMean: 0.07 + mcParams.extraReturn/100,
        annualReturnStd: 0.15,
        runs: 1000,
      });
      setMcResult(result);
      setRunning(false);
    }, 50);
  };

  const annualWR = mcParams.withdrawalRate / 100;

  const scenarios = useMemo(() => [
    { label:'Bear (-2%)', mean:-0.02 },
    { label:'Conservative (4%)', mean:0.04 },
    { label:'Base (7%)', mean:0.07 },
    { label:'Bull (10%)', mean:0.10 },
    { label:'Optimistic (12%)', mean:0.12 },
  ].map(s => {
    const r = runMonteCarlo({
      currentAge:profile.age, retirementAge:mcParams.retirementAge,
      currentSavings:totalPortfolio, monthlyContribution:mcParams.monthlyContribution,
      annualReturnMean:s.mean, annualReturnStd:0.15, runs:500,
    });
    return { ...s, median:r.p50, income:r.p50*annualWR };
  }), [profile.age, mcParams, totalPortfolio, annualWR]);

  return (
    <div>
      <div className="grid g2 gap-6 mb-6">
        <div className="card">
          <div className="section-title">Monte Carlo Retirement Simulation</div>
          <div style={{fontSize:12,color:'#718096',marginBottom:16}}>
            1,000 random market scenarios · Current portfolio: <span className="bold">{fmtFull(totalPortfolio)}</span>
          </div>
          <div className="grid g2 gap-4 mb-4">
            <div className="form-group" style={{marginBottom:0}}><label>Target Retirement Age</label>
              <input type="number" min={profile.age+1} max="85" value={mcParams.retirementAge}
                onChange={e=>setMcParams(p=>({...p,retirementAge:+e.target.value}))} /></div>
            <div className="form-group" style={{marginBottom:0}}><label>Monthly Contribution ($)</label>
              <input type="number" min="0" value={mcParams.monthlyContribution}
                onChange={e=>setMcParams(p=>({...p,monthlyContribution:+e.target.value}))} /></div>
            <div className="form-group" style={{marginBottom:0}}><label>Withdrawal Rate (% SWR)</label>
              <input type="number" min="1" max="10" step="0.5" value={mcParams.withdrawalRate}
                onChange={e=>setMcParams(p=>({...p,withdrawalRate:+e.target.value}))} /></div>
            <div className="form-group" style={{marginBottom:0}}><label>Extra Return Adj. (%)</label>
              <input type="number" min="-5" max="5" step="0.5" value={mcParams.extraReturn}
                onChange={e=>setMcParams(p=>({...p,extraReturn:+e.target.value}))} /></div>
          </div>
          <button className="btn btn-primary" onClick={runSim} disabled={running}>
            {running ? 'Running 1,000 simulations…' : 'Run Simulation'}
          </button>
          {mcResult && (
            <div className="mt-4">
              <div className="grid g3 gap-3 mb-4">
                {[['P10 (Pessimistic)',mcResult.p10,'red'],['P50 (Median)',mcResult.p50,'blue'],['P90 (Optimistic)',mcResult.p90,'green']].map(([l,v,c])=>(
                  <div key={l} style={{background:'#0f1117',padding:12,borderRadius:8,border:'1px solid #2d3748'}}>
                    <div style={{fontSize:11,color:'#718096'}}>{l}</div>
                    <div style={{fontSize:18,fontWeight:700,color:c==='red'?'#fc8181':c==='green'?'#68d391':'#63b3ed'}}>{fmt(v)}</div>
                    <div style={{fontSize:11,color:'#718096'}}>{fmtFull(v*annualWR)}/yr income</div>
                  </div>
                ))}
              </div>
              <ResponsiveContainer width="100%" height={180}>
                <AreaChart data={mcResult.chartData} margin={{top:5,right:10,bottom:0,left:10}}>
                  <defs>
                    <linearGradient id="mcGrad" x1="0" y1="0" x2="0" y2="1">
                      <stop offset="5%" stopColor="#3182ce" stopOpacity={0.4}/>
                      <stop offset="95%" stopColor="#3182ce" stopOpacity={0}/>
                    </linearGradient>
                  </defs>
                  <CartesianGrid strokeDasharray="3 3" stroke="#2d3748" />
                  <XAxis dataKey="year" tick={{fill:'#718096',fontSize:10}} axisLine={false} tickLine={false} />
                  <YAxis tickFormatter={v=>fmt(v)} tick={{fill:'#718096',fontSize:10}} axisLine={false} tickLine={false} />
                  <Tooltip formatter={v=>fmtFull(v)} contentStyle={{background:'#1a1f2e',border:'1px solid #2d3748',borderRadius:6,fontSize:11}} />
                  <Area type="monotone" dataKey="median" stroke="#3182ce" fill="url(#mcGrad)" strokeWidth={2} dot={false} name="Median Path" />
                </AreaChart>
              </ResponsiveContainer>
            </div>
          )}
        </div>

        <div className="card">
          <div className="section-title">Scenario Analysis</div>
          <div style={{fontSize:12,color:'#718096',marginBottom:16}}>
            Median retirement balance at age {mcParams.retirementAge} under different return assumptions
          </div>
          <table>
            <thead><tr><th>Scenario</th><th className="tr">Median Portfolio</th><th className="tr">Annual Income ({mcParams.withdrawalRate}% SWR)</th></tr></thead>
            <tbody>
              {scenarios.map(s => (
                <tr key={s.label}>
                  <td>{s.label}</td>
                  <td className="tr bold">{fmt(s.median)}</td>
                  <td className="tr">{fmt(s.income)}<span className="gray" style={{fontSize:11}}>/yr</span></td>
                </tr>
              ))}
            </tbody>
          </table>
          <hr className="divider" />
          <div className="section-title" style={{marginTop:8}}>Savings Rate Impact</div>
          <ResponsiveContainer width="100%" height={160}>
            <LineChart data={[500,1000,1500,2000,3000,4000,5000].map(mc => {
              const r = runMonteCarlo({currentAge:profile.age,retirementAge:mcParams.retirementAge,currentSavings:totalPortfolio,monthlyContribution:mc,annualReturnMean:0.07,annualReturnStd:0.15,runs:200});
              return {mc:`$${mc/1000}K`,p50:r.p50};
            })} margin={{top:5,right:10,bottom:0,left:10}}>
              <CartesianGrid strokeDasharray="3 3" stroke="#2d3748" />
              <XAxis dataKey="mc" tick={{fill:'#718096',fontSize:10}} axisLine={false} tickLine={false} />
              <YAxis tickFormatter={v=>fmt(v)} tick={{fill:'#718096',fontSize:10}} axisLine={false} tickLine={false} />
              <Tooltip formatter={v=>fmtFull(v)} contentStyle={{background:'#1a1f2e',border:'1px solid #2d3748',borderRadius:6,fontSize:11}} />
              <Line type="monotone" dataKey="p50" stroke="#68d391" strokeWidth={2} dot={{fill:'#68d391',r:3}} name="Median at Retirement" />
            </LineChart>
          </ResponsiveContainer>
        </div>
      </div>
    </div>
  );
}

function MarketTab({ state, dispatch }) {
  const { assets, apiKeys, news, macro, newsFetchedAt, macroFetchedAt } = state;
  const [loading, setLoading] = useState({ news:false, macro:false });

  const FRED_SERIES = [
    { id:'FEDFUNDS', label:'Fed Funds Rate', unit:'%' },
    { id:'CPIAUCSL', label:'CPI (Inflation)', unit:' index' },
    { id:'UNRATE',   label:'Unemployment Rate', unit:'%' },
    { id:'DGS10',    label:'10-Year Treasury', unit:'%' },
  ];

  const fetchNewsData = useCallback(async () => {
    if (!apiKeys.finnhub) return;
    setLoading(l=>({...l,news:true}));
    const results = {}, errs = {};
    for (const a of assets.filter(a=>a.assetType!=='crypto'&&a.assetType!=='other').slice(0,8)) {
      try { results[a.ticker] = await fetchFinnhubNews(a.ticker); await sleep(300); }
      catch(e) { errs[a.ticker] = e.message; }
    }
    const now = new Date().toISOString();
    dispatch({ type:'SET_NEWS', data: results, fetchedAt: now });
    apiPost('/api/market-cache', { type: 'news', data: results }).catch(() => {});
    setLoading(l=>({...l,news:false}));
  }, [assets, apiKeys.finnhub, dispatch]);

  const fetchMacroData = useCallback(async () => {
    if (!apiKeys.fred) return;
    setLoading(l=>({...l,macro:true}));
    const results = {};
    for (const s of FRED_SERIES) {
      try {
        const data = await fetchFRED(s.id);
        results[s.id] = data.slice(0,12).reverse();
      } catch(e) {}
      await sleep(200);
    }
    const now = new Date().toISOString();
    dispatch({ type:'SET_MACRO', data: results, fetchedAt: now });
    apiPost('/api/market-cache', { type: 'macro', data: results }).catch(() => {});
    setLoading(l=>({...l,macro:false}));
  }, [apiKeys.fred, dispatch]);

  return (
    <div>
      <div className="card mb-6">
        <div className="flex items-center justify-between mb-4">
          <div className="section-title" style={{marginBottom:0}}>Macro Indicators</div>
          <div className="flex gap-2 items-center">
            {loading.macro && <span className="spinner" />}
            {macroFetchedAt && !loading.macro && <span style={{fontSize:10,color:'#718096'}}>cached {new Date(macroFetchedAt).toLocaleDateString()}</span>}
            {!apiKeys.fred && <span style={{fontSize:11,color:'#718096'}}>Add FRED API key for live macro data</span>}
            <button className="btn btn-secondary btn-sm" onClick={fetchMacroData} disabled={loading.macro||!apiKeys.fred}>
              {loading.macro?'Loading…':'Fetch Macro Data'}
            </button>
          </div>
        </div>
        <div className="grid g2 gap-4">
          {FRED_SERIES.map(s => {
            const obs = macro[s.id];
            const latest = obs?.[obs.length-1];
            const prev   = obs?.[obs.length-2];
            const change = latest&&prev ? latest.value-prev.value : null;
            return (
              <div key={s.id} style={{background:'#0f1117',borderRadius:8,padding:14,border:'1px solid #2d3748'}}>
                <div style={{fontSize:11,color:'#718096',marginBottom:4}}>{s.label}</div>
                <div style={{fontSize:20,fontWeight:700}}>
                  {latest ? `${latest.value.toFixed(2)}${s.unit}` : <span className="gray">—</span>}
                  {change!==null && <span style={{fontSize:13,marginLeft:8,color:change>=0?'#fc8181':'#68d391'}}>{change>=0?'+':''}{change.toFixed(2)}</span>}
                </div>
                {obs&&obs.length>1 && (
                  <ResponsiveContainer width="100%" height={50}>
                    <LineChart data={obs} margin={{top:4,right:4,bottom:0,left:4}}>
                      <Line type="monotone" dataKey="value" stroke="#3182ce" strokeWidth={1.5} dot={false} />
                    </LineChart>
                  </ResponsiveContainer>
                )}
              </div>
            );
          })}
        </div>
      </div>

      <div className="card">
        <div className="flex items-center justify-between mb-4">
          <div className="section-title" style={{marginBottom:0}}>News — Your Holdings</div>
          <div className="flex gap-2 items-center">
            {loading.news && <span className="spinner" />}
            {newsFetchedAt && !loading.news && <span style={{fontSize:10,color:'#718096'}}>cached {new Date(newsFetchedAt).toLocaleDateString()}</span>}
            {!apiKeys.finnhub && <span style={{fontSize:11,color:'#718096'}}>Add Finnhub API key for news</span>}
            <button className="btn btn-secondary btn-sm" onClick={fetchNewsData} disabled={loading.news||!apiKeys.finnhub||assets.length===0}>
              {loading.news?'Loading…':'Fetch News'}
            </button>
          </div>
        </div>
        {Object.keys(news).length===0 && (
          <div className="gray tc" style={{padding:24,fontSize:13}}>
            {assets.length===0?'Add assets to see relevant news':'Click "Fetch News" to load articles for your holdings'}
          </div>
        )}
        {Object.entries(news).map(([ticker,articles]) => (
          <div key={ticker} className="mb-6">
            <div style={{fontSize:13,fontWeight:600,color:'#63b3ed',marginBottom:8}}>{ticker}</div>
            {articles.length===0 && <div className="gray" style={{fontSize:12}}>No recent news</div>}
            {articles.map((a,i) => (
              <div key={i} style={{borderLeft:'2px solid #2d3748',paddingLeft:12,marginBottom:10}}>
                <div style={{fontSize:13,fontWeight:500,marginBottom:2}}>{a.headline}</div>
                <div style={{fontSize:11,color:'#718096'}}>
                  {a.source} · {new Date(a.datetime*1000).toLocaleDateString()}
                  {a.url && <> · <a href={a.url} target="_blank" rel="noopener" style={{color:'#63b3ed'}}>Read →</a></>}
                </div>
                {a.summary && <div style={{fontSize:12,color:'#a0aec0',marginTop:4,lineHeight:1.5}}>{a.summary.slice(0,200)}{a.summary.length>200?'…':''}</div>}
              </div>
            ))}
          </div>
        ))}
      </div>
    </div>
  );
}

function buildContext(state) {
  const { profile, assets, liabilities, cash, goals, livePrices } = state;
  const totalPortfolio = assets.reduce((s,a)=>s+(livePrices[a.ticker]?.price||a.costBasis)*a.shares,0);
  const totalCash = cash.reduce((s,c)=>s+c.amount,0);
  const totalDebt = liabilities.reduce((s,l)=>s+l.balance,0);
  const netWorth  = totalPortfolio + totalCash - totalDebt;
  const assetLines = assets.map(a=>{
    const price = livePrices[a.ticker]?.price||a.costBasis;
    const val = price*a.shares;
    const gainPct = a.costBasis>0?((val-a.costBasis*a.shares)/(a.costBasis*a.shares)*100).toFixed(1):'N/A';
    return `  - ${a.ticker} (${a.assetType}): ${a.shares} shares @ $${price.toFixed(2)} = $${val.toFixed(0)} [${gainPct}% gain, ${a.accountType}]`;
  }).join('\n');
  const liabilityLines = liabilities.map(l=>`  - ${l.name} (${l.type}): $${l.balance.toFixed(0)} @ ${l.apr}% APR, min $${l.minPayment}/mo`).join('\n');
  const cashLines = cash.map(c=>`  - ${c.name}: $${c.amount.toFixed(0)} @ ${c.apy}% APY`).join('\n');
  const goalLines = goals.map(g=>{
    const mo = monthsBetween(new Date(), g.targetDate);
    const rem = Math.max(0,g.targetAmount-g.currentSaved);
    return `  - ${g.name}: $${g.currentSaved.toFixed(0)}/$${g.targetAmount.toFixed(0)} saved (${mo} months to target), needs $${mo>0?(rem/mo).toFixed(0):rem}/mo`;
  }).join('\n');
  return `USER FINANCIAL PROFILE:
Name: ${profile.name} | Age: ${profile.age} | Income: $${(profile.annualIncome||0).toLocaleString()}/yr | Tax Rate: ${profile.marginalTaxRateOverride ?? calcMarginalRate(profile.annualIncome, profile.filingStatus)}%
Risk Tolerance: ${profile.riskTolerance}/5 | Primary Goal: ${profile.primaryGoal}

NET WORTH: $${netWorth.toFixed(0)}
  Portfolio: $${totalPortfolio.toFixed(0)}
  Cash: $${totalCash.toFixed(0)}
  Total Debt: $${totalDebt.toFixed(0)}

INVESTMENT PORTFOLIO:
${assetLines||'  (none)'}

LIABILITIES:
${liabilityLines||'  (none)'}

CASH & SAVINGS:
${cashLines||'  (none)'}

FINANCIAL GOALS:
${goalLines||'  (none)'}`.trim();
}

function AgentsTab({ state, dispatch }) {
  const { apiKeys, agentResults, agentStatus, agentChat, agentUpdatedAt } = state;
  // ref needed to avoid stale closures in async runAll loop
  const agentResultsRef = useRef(agentResults);
  useEffect(() => { agentResultsRef.current = agentResults; }, [agentResults]);
  const agentChatRef = useRef(agentChat);
  useEffect(() => { agentChatRef.current = agentChat; }, [agentChat]);

  const [expanded, setExpanded]   = useState(() => {
    // Auto-expand any agent that already has a saved result
    const init = {};
    AGENT_DEFS.forEach(d => { if (agentResults[d.id]) init[d.id] = true; });
    if (agentResults.synthesis) init.synthesis = true;
    return init;
  });
  const [runningAll, setRunningAll] = useState(false);
  const [chatInput, setChatInput]     = useState('');
  const [chatLoading, setChatLoading] = useState(false);
  const chatRef = useRef(null);

  useEffect(() => {
    if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
  }, [agentChat]);

  const ctx = useMemo(() => buildContext(state), [state]);

  const setAgentResult = (id, result) => dispatch({ type:'SET_AGENT_RESULT', id, result });
  const setAgentStatus = (id, status) => dispatch({ type:'SET_AGENT_STATUS', id, status });

  const runAgent = useCallback(async (def) => {
    if (!apiKeys.anthropic) return;
    setAgentStatus(def.id, 'running');
    setExpanded(e=>({...e,[def.id]:true}));
    let attempt=0, result=null;
    while (attempt<3 && result===null) {
      if (attempt>0) await sleep(attempt*5000);
      try {
        result = await callAPI([{role:'user',content:def.prompt}], def.systemPrompt(ctx), apiKeys.anthropic, 1400);
      } catch(e) {
        attempt++;
        if (attempt>=3) { setAgentStatus(def.id,'error'); setAgentResult(def.id,`Error: ${e.message}`); return; }
      }
    }
    agentResultsRef.current = {...agentResultsRef.current,[def.id]:result};
    setAgentResult(def.id, result);
    setAgentStatus(def.id, 'done');
    apiPost('/api/agent-cache', { results: agentResultsRef.current, chat: [] }).catch(()=>{});
  }, [apiKeys.anthropic, ctx]);

  const runAll = useCallback(async () => {
    if (!apiKeys.anthropic||runningAll) return;
    setRunningAll(true);
    agentResultsRef.current = {};
    dispatch({ type:'CLEAR_AGENTS' });
    for (let i=0; i<AGENT_DEFS.length; i++) {
      await runAgent(AGENT_DEFS[i]);
      if (i<AGENT_DEFS.length-1) await sleep(1500);
    }
    const agentSummaries = AGENT_DEFS.map(d=>`## ${d.name}\n${agentResultsRef.current[d.id]||'(not run)'}`).join('\n\n');
    setAgentStatus('synthesis', 'running');
    setExpanded(e=>({...e,synthesis:true}));
    let attempt=0, synthResult=null;
    while (attempt<3&&synthResult===null) {
      if (attempt>0) await sleep(attempt*5000);
      try {
        synthResult = await callAPI(
          [{role:'user',content:`Based on all specialist analyses below, provide a comprehensive financial health scorecard (A-F grades for each area) and exactly 3 specific, high-priority actions to take THIS MONTH. Format grades EXACTLY as: \`Portfolio: B+\`, \`Debt: C\`, \`Tax: A-\`, \`Retirement: B\`, \`Risk: C+\`, \`Macro: B\` (use these exact category names).\n\n${agentSummaries}`}],
          `You are a Chief Investment Officer synthesizing specialist reports for ${state.profile.name}. Be direct, specific, and actionable. ${ctx}`,
          apiKeys.anthropic, 1600
        );
      } catch(e) { attempt++; if (attempt>=3) { setAgentStatus('synthesis','error'); setRunningAll(false); return; } }
    }
    setAgentResult('synthesis', synthResult);
    setAgentStatus('synthesis', 'done');
    dispatch({ type:'SET_AGENT_UPDATED_AT', updatedAt: new Date().toISOString() });
    setRunningAll(false);
    // Persist results so they survive page refresh
    const finalResults = {...agentResultsRef.current, synthesis: synthResult};
    const ts = new Date().toISOString();
    apiPost('/api/agent-cache', { results: finalResults, chat: agentChatRef.current, updatedAt: ts }).catch(()=>{});
  }, [apiKeys.anthropic, runningAll, runAgent, state.profile.name, ctx, state.agentChat]);

  const runSynthesisOnly = useCallback(async () => {
    if (!apiKeys.anthropic) return;
    const agentSummaries = AGENT_DEFS.map(d=>`## ${d.name}\n${agentResults[d.id]||'(not run)'}`).join('\n\n');
    setAgentStatus('synthesis', 'running');
    setExpanded(e=>({...e,synthesis:true}));
    try {
      const r = await callAPI(
        [{role:'user',content:`Synthesize these specialist reports into a financial health scorecard and 3 immediate action items.\n\n${agentSummaries}`}],
        `You are a Chief Investment Officer. ${ctx}`, apiKeys.anthropic, 1600
      );
      setAgentResult('synthesis', r);
      setAgentStatus('synthesis', 'done');
    } catch(e) { setAgentStatus('synthesis','error'); }
  }, [apiKeys.anthropic, agentResults, ctx]);

  const sendChat = useCallback(async (msg) => {
    if (!msg.trim()||!apiKeys.anthropic||chatLoading) return;
    const history = [...agentChat, {role:'user',content:msg}];
    dispatch({ type:'SET_AGENT_CHAT', chat:history });
    setChatInput(''); setChatLoading(true);
    try {
      const reply = await callAPI(history, `You are FinPal, a personal financial advisor. Be specific, data-driven, and actionable. Always reference their actual numbers.\n\n${ctx}`, apiKeys.anthropic, 1000);
      const updatedChat = [...history,{role:'assistant',content:reply}];
      dispatch({ type:'SET_AGENT_CHAT', chat:updatedChat });
      apiPost('/api/agent-cache', { results: agentResultsRef.current, chat: updatedChat, updatedAt: agentUpdatedAt || new Date().toISOString() }).catch(()=>{});
    } catch(e) { dispatch({ type:'SET_AGENT_CHAT', chat:[...history,{role:'assistant',content:`Error: ${e.message}`}] }); }
    setChatLoading(false);
  }, [apiKeys.anthropic, agentChat, agentResults, chatLoading, ctx]);

  const CHIPS = ['Am I on track for retirement?','Which debt should I pay first?','What should I invest $500/month in?','How can I reduce my taxes?','What is my biggest financial risk?'];

  const statusBadge = id => {
    const s = agentStatus[id];
    if (s==='running') return <span className="agent-running" style={{fontSize:12,color:'#63b3ed'}}>● Running…</span>;
    if (s==='done')    return <span className="badge b-green">✓ Done</span>;
    if (s==='error')   return <span className="badge b-red">✗ Error</span>;
    return <span className="badge" style={{background:'#2d3748',color:'#718096'}}>Idle</span>;
  };

  if (!apiKeys.anthropic) {
    return (
      <div className="card tc" style={{padding:40}}>
        <div style={{fontSize:32,marginBottom:12}}>🤖</div>
        <div className="bold" style={{fontSize:16,marginBottom:8}}>Anthropic API Key Required</div>
        <div className="gray" style={{fontSize:13}}>Add your Anthropic API key in Settings to use AI Agents and the personal advisor chat.</div>
      </div>
    );
  }

  return (
    <div>
      <div className="flex items-center justify-between mb-6">
        <div>
          <div className="bold" style={{fontSize:15}}>AI Financial Advisory Team</div>
          <div style={{fontSize:12,color:'#718096'}}>6 specialist agents analyze your complete financial picture</div>
        </div>
        <div className="flex gap-2">
          <button className="btn btn-secondary btn-sm" onClick={runSynthesisOnly} disabled={runningAll}>Synthesize Only</button>
          <button className="btn btn-primary" onClick={runAll} disabled={runningAll}>
            {runningAll?<span className="flex items-center gap-2"><span className="spinner" />Running all agents…</span>:'▶ Run All Agents'}
          </button>
        </div>
      </div>

      {AGENT_DEFS.map(def => (
        <div key={def.id} className="agent-card">
          <div className="agent-hdr" onClick={()=>setExpanded(e=>({...e,[def.id]:!e[def.id]}))}>
            <div className="agent-icon" style={{background:def.bg}}><span>{def.icon}</span></div>
            <div className="flex-1">
              <div className="bold" style={{fontSize:13}}>{def.name}</div>
              <div style={{fontSize:11,color:'#718096'}}>{def.prompt.slice(0,80)}…</div>
            </div>
            {statusBadge(def.id)}
            <button className="btn btn-secondary btn-sm" style={{marginLeft:8}}
              onClick={e=>{e.stopPropagation();runAgent(def);}}
              disabled={runningAll||agentStatus[def.id]==='running'}>
              {agentStatus[def.id]==='running'?'…':'Run'}
            </button>
            <span style={{color:'#718096',marginLeft:8,fontSize:12}}>{expanded[def.id]?'▲':'▼'}</span>
          </div>
          {expanded[def.id]&&agentResults[def.id] && (
            <div className="agent-body"><RenderedText text={agentResults[def.id]} /></div>
          )}
        </div>
      ))}

      <div className="agent-card" style={{border:'1px solid #3182ce'}}>
        <div className="agent-hdr" onClick={()=>setExpanded(e=>({...e,synthesis:!e.synthesis}))}>
          <div className="agent-icon" style={{background:'#1a3a5c'}}>🎖️</div>
          <div className="flex-1">
            <div className="bold" style={{fontSize:13,color:'#63b3ed'}}>CIO Synthesis — Financial Health Report</div>
            <div style={{fontSize:11,color:'#718096'}}>Scorecard + 3 action items based on all specialist analyses</div>
          </div>
          {statusBadge('synthesis')}
          <span style={{color:'#718096',marginLeft:8,fontSize:12}}>{expanded.synthesis?'▲':'▼'}</span>
        </div>
        {expanded.synthesis&&agentResults.synthesis && (
          <div className="agent-body"><RenderedText text={agentResults.synthesis} /></div>
        )}
      </div>

      <div className="mt-4">
        <div className="section-title">Personal Advisor Chat</div>
        <div className="chat-wrap">
          <div className="chat-msgs" ref={chatRef}>
            {agentChat.length===0 && (
              <div className="gray tc" style={{fontSize:12,marginTop:20}}>Ask your personal advisor anything about your finances</div>
            )}
            {agentChat.map((m,i) => (
              <div key={i} className={`chat-msg ${m.role==='user'?'user':'ai'}`}>
                {m.role==='assistant'?<RenderedText text={m.content}/>:m.content}
              </div>
            ))}
            {chatLoading && <div className="chat-msg ai gray" style={{fontSize:12}}>Thinking…</div>}
          </div>
          <div style={{padding:'6px 10px',borderTop:'1px solid #2d3748',display:'flex',flexWrap:'wrap',gap:4}}>
            {CHIPS.map(chip=><span key={chip} className="chip" onClick={()=>sendChat(chip)}>{chip}</span>)}
          </div>
          <div className="chat-input">
            <input value={chatInput} onChange={e=>setChatInput(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&!e.shiftKey&&sendChat(chatInput)}
              placeholder="Ask about your finances… (Enter to send)" disabled={chatLoading} />
            <button className="btn btn-primary btn-sm" onClick={()=>sendChat(chatInput)} disabled={chatLoading||!chatInput.trim()}>Send</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function SettingsModal({ state, dispatch, onLogout, onClose }) {
  const [keys, setKeys] = useState({...state.apiKeys});
  const [prof, setProf] = useState({...state.profile});
  const [saving, setSaving] = useState(false);

  const save = async () => {
    setSaving(true);
    try {
      await Promise.all([apiPut('/api/keys', keys), apiPut('/api/profile', prof)]);
      dispatch({ type:'SET_KEYS', keys });
      dispatch({ type:'SET_SETUP_COMPLETE', profile:prof });
      onClose();
    } catch(e) { setSaving(false); }
  };

  const logout = async () => {
    try { await apiPost('/api/auth/logout', {}); } catch(e) {}
    onLogout();
  };

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
      <div className="card" style={{width:500,maxWidth:'100%',maxHeight:'90vh',overflowY:'auto'}}>
        <div className="flex items-center justify-between mb-4">
          <div className="section-title" style={{marginBottom:0}}>Settings</div>
          <button className="btn btn-secondary btn-sm" onClick={onClose}>✕</button>
        </div>

        <div style={{fontSize:11,fontWeight:600,color:'#718096',textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:10}}>API Keys</div>
        <p style={{fontSize:11,color:'#4a5568',marginBottom:14,lineHeight:1.6}}>Keys are stored in this server's database and sent directly to each provider from your browser — never proxied.</p>
        {[['anthropic','Anthropic API Key'],['alphaVantage','Alpha Vantage Key'],['finnhub','Finnhub Key'],['fred','FRED Key']].map(([k,label])=>(
          <div key={k} className="form-group">
            <label>{label}</label>
            <input type="password" value={keys[k]||''} onChange={e=>setKeys(ks=>({...ks,[k]:e.target.value}))} autoComplete="off" />
          </div>
        ))}

        <hr className="divider" />
        <div style={{fontSize:11,fontWeight:600,color:'#718096',textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:10}}>Profile</div>
        <div className="grid g2 gap-4">
          <div className="form-group"><label>Name</label>
            <input value={prof.name||''} onChange={e=>setProf(p=>({...p,name:e.target.value}))} /></div>
          <div className="form-group"><label>Age</label>
            <input type="number" min="18" max="90" value={prof.age||30} onChange={e=>setProf(p=>({...p,age:+e.target.value}))} /></div>
          <div className="form-group"><label>Annual Income ($)</label>
            <input type="number" min="0" value={prof.annualIncome||0} onChange={e=>setProf(p=>({...p,annualIncome:+e.target.value}))} /></div>
          <div className="form-group"><label>Filing Status</label>
            <select value={prof.filingStatus||'single'} onChange={e=>setProf(p=>({...p,filingStatus:e.target.value}))}>
              <option value="single">Single</option>
              <option value="married_jointly">Married Filing Jointly</option>
              <option value="married_separately">Married Filing Separately</option>
              <option value="head_of_household">Head of Household</option>
            </select></div>
        </div>
        {(() => {
          const rate = prof.marginalTaxRateOverride != null
            ? prof.marginalTaxRateOverride
            : calcMarginalRate(prof.annualIncome, prof.filingStatus);
          return (
            <div style={{background:'#0f1117',border:'1px solid #2d3748',borderRadius:6,padding:'8px 12px',marginTop:8,fontSize:12}}>
              <span style={{color:'#a0aec0'}}>Federal marginal rate: </span>
              <span className="bold blue">{rate}%</span>
              <span style={{color:'#718096'}}> · </span>
              <label style={{cursor:'pointer',color:'#63b3ed'}}>
                <input type="checkbox" style={{marginRight:4}} checked={prof.marginalTaxRateOverride!=null}
                  onChange={e=>setProf(p=>({...p,marginalTaxRateOverride:e.target.checked?rate:null}))} />
                Override
              </label>
              {prof.marginalTaxRateOverride!=null && (
                <input type="number" min="0" max="60" step="1" value={prof.marginalTaxRateOverride}
                  onChange={e=>setProf(p=>({...p,marginalTaxRateOverride:+e.target.value}))}
                  style={{width:55,marginLeft:8}} />
              )}
            </div>
          );
        })()}

        <div className="flex justify-between" style={{marginTop:20}}>
          <button className="btn btn-danger btn-sm" onClick={logout}>Log Out</button>
          <button className="btn btn-primary" onClick={save} disabled={saving}>{saving?'Saving…':'Save Changes'}</button>
        </div>
      </div>
    </div>
  );
}

      </div>
      <div style={{textAlign:'center',padding:'0 24px 36px',color:'#4a5568',fontSize:12}}>
        Open source · Self-hosted · No bank sync required · No data sold
      </div>
    </div>
  );
}

function App() {
  const [authUser, setAuthUser]     = useState(null);
  const [authChecked, setAuthChecked] = useState(false);
  const [state, dispatch]           = useReducer(reducer, BLANK);
  const [showSettings, setShowSettings] = useState(false);
  const [showLanding, setShowLanding] = React.useState(true);

  useEffect(() => {
    apiGet('/api/auth/me')
      .then(d => {
        if (d.user) { setAuthUser(d.user); return apiGet('/api/me/data'); }
        return null;
      })
      .then(data => { if (data) dispatch({ type:'HYDRATE', payload:data }); setAuthChecked(true); })
      .catch(() => setAuthChecked(true));
  }, []);

  const handleLogin = async (user) => {
    setAuthUser(user);
    try { const data = await apiGet('/api/me/data'); dispatch({ type:'HYDRATE', payload:data }); } catch(e) {}
  };

  const handleLogout = () => {
    setAuthUser(null);
    dispatch({ type:'HYDRATE', payload:{ profile:{}, assets:[], liabilities:[], cash:[], goals:[], apiKeys:BLANK.apiKeys, snapshots:[] }});
  };

  const handleSetupComplete = (data) => {
    dispatch({ type:'HYDRATE', payload:{ ...data, profile:{ ...data.profile, setupComplete:true } }});
  };

  if (!authChecked) return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',background:'#0f1117'}}>
      <div className="spinner" style={{width:32,height:32,borderWidth:3}} />
    </div>
  );

  if (!authUser) {
    if (showLanding) return <LandingPage onGetStarted={() => setShowLanding(false)} />;
    return <LoginScreen onLogin={handleLogin} />;
  }
  if (!state.setupComplete) return <SetupWizard onComplete={handleSetupComplete} />;

  const totalPortfolio = state.assets.reduce((s,a) => s+(state.livePrices[a.ticker]?.price||a.costBasis)*a.shares, 0);
  const totalCash  = state.cash.reduce((s,c)=>s+c.amount, 0);
  const totalDebt  = state.liabilities.reduce((s,l)=>s+l.balance, 0);
  const netWorth   = totalPortfolio + totalCash - totalDebt;

  const tabContent = () => {
    switch (state.activeTab) {
      case 'Net Worth':  return <NetWorthTab state={state} dispatch={dispatch} />;
      case 'Portfolio':  return <PortfolioTab state={state} dispatch={dispatch} />;
      case 'Debt':       return <DebtTab state={state} dispatch={dispatch} />;
      case 'Goals':      return <GoalsTab state={state} dispatch={dispatch} />;
      case 'Models':     return <ModelsTab state={state} />;
      case 'Market':     return <MarketTab state={state} dispatch={dispatch} />;
      case 'AI Agents':  return <AgentsTab state={state} dispatch={dispatch} />;
      default:           return null;
    }
  };

  return (
    <div className="app">
      <div className="header">
        <div style={{fontSize:20,marginRight:4}}>💰</div>
        <h1>FinPal</h1>
        {state.profile.name && <span style={{fontSize:13,color:'#718096'}}>— {state.profile.name}</span>}
        <div className="header-stats">
          <div className="header-stat"><div className="lbl">Net Worth</div><div className="val" style={{color:netWorth>=0?'#68d391':'#fc8181'}}>{fmt(netWorth)}</div></div>
          <div className="header-stat"><div className="lbl">Portfolio</div><div className="val">{fmt(totalPortfolio)}</div></div>
          <div className="header-stat"><div className="lbl">Debt</div><div className="val red">{fmt(totalDebt)}</div></div>
        </div>
        <button className="btn btn-secondary btn-sm" style={{marginLeft:8}} onClick={()=>setShowSettings(true)}>⚙ Settings</button>
      </div>
      <div className="tabs">
        {TABS.map(t=>(
          <div key={t} className={`tab ${state.activeTab===t?'active':''}`} onClick={()=>dispatch({type:'SET_TAB',tab:t})}>{t}</div>
        ))}
      </div>
      <div className="content">{tabContent()}</div>
      {showSettings && <SettingsModal state={state} dispatch={dispatch} onLogout={handleLogout} onClose={()=>setShowSettings(false)} />}
    </div>
  );
}

try {
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
} catch(e) {
  console.error('FinPal render error:', e);
  document.getElementById('root').innerHTML =
    '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;color:#fc8181;background:#0f1117;flex-direction:column;gap:12px">' +
    '<div style="font-size:20px">⚠ App failed to start: ' + e.message + '</div>' +
    '<div style="color:#718096;font-size:11px">Open browser console (F12) for details.</div></div>';
}
</script>
</body>
</html>
